.site-footer b{color:var(--goldL);}

@media (max-width:900px){
  #sb{transform:translateX(-100%);transition:transform .3s;}
  #sb.open{transform:translateX(0);}
  #sbToggle{display:flex;align-items:center;justify-content:center;}
  .main{margin-left:0;}
  .site-hero h1{font-size:34px;letter-spacing:4px;}
  .site-hero{padding:50px 20px 40px;}
  .two-col,.three-col{grid-template-columns:1fr;}
  .ch-head{padding:36px 20px;}
  .ch-name{font-size:24px;letter-spacing:3px;}
  .ch-body{padding:26px 20px 10px;}
  h2{font-size:19px;}
}
@media (max-width:600px){
  body{font-size:15.5px;}
  .verse{font-size:16px;padding:14px 16px;}
  .classical-text{padding:14px 16px;}
}

/* ── 基礎：隱藏滾動條、防複製 ── */
html,body{margin:0;padding:0;background:transparent;
  overflow:hidden!important;
  scrollbar-width:none!important;-ms-overflow-style:none!important;
  -webkit-user-select:none!important;-moz-user-select:none!important;
  -ms-user-select:none!important;user-select:none!important;
  -webkit-touch-callout:none!important;}
html::-webkit-scrollbar,body::-webkit-scrollbar,
*::-webkit-scrollbar{display:none!important;width:0!important;height:0!important;}
*{-webkit-user-select:none!important;-moz-user-select:none!important;
  -ms-user-select:none!important;user-select:none!important;
  -webkit-user-drag:none!important;
  scrollbar-width:none!important;}
body{padding:0 8px;}
#sb,#sbToggle,#backTop,aside.sb{display:none!important;}
.main{margin-left:0!important;}
img{-webkit-user-drag:none!important;pointer-events:none;}

/* ── 高度自適應（避免 iframe 內出現多餘空白） ── */
html,body,.main,main,.container,.wrap,.wrapper,.page,#app,#root{
  min-height:0!important;height:auto!important;}
.site-footer,footer.site-footer{min-height:0!important;}

/* ── 全面取消斜體：經典原典用正體更莊重 ── */
*{font-style:normal!important;}

/* ── 內容區底色統一為暖色調，避免純白 ── */
.ch-body{
  background:var(--bg,#f7f3ec)!important;
  max-width:980px!important;
  margin:0 auto!important;
  padding:36px 28px 48px!important;}

/* ── 章標題統一為深色漸層居中樣式 ── */
.ch-head{
  background:var(--headGrad,linear-gradient(135deg,#2a2218 0%,#3d3225 50%,#2a2218 100%))!important;
  padding:42px 32px!important;
  text-align:center!important;
  border-left:none!important;
  border-radius:0!important;
  position:relative!important;}
.ch-head .ch-num{
  font-size:12px!important;color:var(--gold,#b8860b)!important;
  letter-spacing:3px!important;opacity:.8!important;}
.ch-head .ch-title,
.ch-head .ch-name{
  font-size:30px!important;font-weight:900!important;
  color:#fff!important;letter-spacing:3px!important;}
.ch-head .ch-sub,
.ch-head .ch-desc{
  font-size:14.5px!important;color:var(--goldL,#d4a84b)!important;
  opacity:.85!important;max-width:600px!important;margin:0 auto!important;}

/* ── TOC 卡片統一底色 + 標題居中 ── */
.toc-card{background:var(--card,#fffdf7)!important;}
.toc-section{background:var(--card,#fffdf7)!important;}
.toc-title,.toc-desc,.toc-header{text-align:center!important;}

/* ── 所有白底區塊統一為暖色（避免純白） ── */
.card,.insight,.commentary,.note,.metaphor,
.col,.flow,.compare-table,.cell,.col-card{
  background:var(--card,#fffdf7)!important;}

/* ── 區塊標題強調色 ── */
.card-title,.col-title,.cell-title{
  color:var(--accent,#8b5e3c)!important;font-weight:700!important;}

/* ── 公式區塊：含 br 的 span 需 inline-block 避免邊框重疊 ── */
span[style*=&quot;border&quot;]{
  display:inline-block!important;vertical-align:middle!important;margin:6px 4px!important;}

/* ── 內文字體統一為 17px ── */
.card-content,.col-content,.section-content,
.insight,.commentary,.note,.cell-content,
.flow-step,.compare-table td{
  font-size:17px!important;line-height:1.8!important;}

/* ── 重點詞語強調 ── */
.card-content strong,.col-content strong,
.cell-content strong,.section-content strong,
.insight strong{color:var(--accent-red,#8B2500)!important;}

/* ── 節標題統一：左金邊 + 漸層背景色塊 ── */
.section-title,h3.section-title{
  font-size:18px!important;font-weight:700!important;
  color:var(--accent,#8b5e3c)!important;
  padding:10px 0 10px 20px!important;
  border-left:4px solid var(--gold,#b8860b)!important;
  border-bottom:none!important;
  background:linear-gradient(90deg,rgba(184,134,11,.06),transparent)!important;
  margin:24px 0 14px!important;}

<button id="backTop">↑</button>
<script>
(function(){
  var rpFill = document.getElementById('rpFill');
  var rpPct  = document.getElementById('rpPct');
  function updateProgress(){
    var sh = document.documentElement.scrollHeight - window.innerHeight;
    var pct = sh > 0 ? Math.min(100, Math.max(0, window.scrollY / sh * 100)) : 0;
    if(rpFill) rpFill.style.width = pct + '%';
    if(rpPct)  rpPct.textContent  = Math.round(pct) + '%';
  }
  var sbItems = document.querySelectorAll('.sb-item');
  var chapters = document.querySelectorAll('.chapter');
  function updateActive(){
    var fh = window.innerHeight * 0.35, act = null;
    chapters.forEach(function(c){
      if(c.getBoundingClientRect().top < fh) act = c;
    });
    sbItems.forEach(function(it){ it.classList.remove('active'); });
    if(act){
      var id = act.id.replace('chapter-','');
      var match = document.querySelector('.sb-item[data-ch="'+id+'"]');
      if(match){
        match.classList.add('active');
        var sb = document.getElementById('sb');
        var rect = match.getBoundingClientRect();
        if(rect.top < 60 || rect.bottom > window.innerHeight - 30){
          sb.scrollTo({top: match.offsetTop - 100, behavior:'smooth'});
        }
      }
    }
  }
  var bt = document.getElementById('backTop');
  function updateBackTop(){
    if(window.scrollY > 600) bt.classList.add('show');
    else bt.classList.remove('show');
  }
  bt.onclick = function(){ window.scrollTo({top:0, behavior:'smooth'}); };
  var sb = document.getElementById('sb');
  document.getElementById('sbToggle').onclick = function(){ sb.classList.toggle('open'); };
  document.querySelectorAll('.sb-item').forEach(function(it){
    it.addEventListener('click', function(){ sb.classList.remove('open'); });
  });
  window.addEventListener('scroll', function(){
    updateProgress(); updateActive(); updateBackTop();
  }, {passive:true});
  updateProgress(); updateActive(); updateBackTop();

  function resizeFrame(f){
    try{
      var d = f.contentDocument || f.contentWindow.document;
      if(!d || !d.body) return;
      var h = Math.max(d.documentElement.scrollHeight, d.body.scrollHeight);
      if(h > 100) f.style.height = (h + 24) + 'px';
    }catch(e){}
  }
  function setupFrame(f){
    var tries = 0;
    function tick(){
      tries++;
      resizeFrame(f);
      if(tries < 30) setTimeout(tick, 200);
    }
    if(f.contentDocument && f.contentDocument.readyState === 'complete') tick();
    else f.addEventListener('load', tick);
  }
  document.querySelectorAll('iframe.ch-frame').forEach(setupFrame);
  var rzT;
  window.addEventListener('resize', function(){
    clearTimeout(rzT);
    rzT = setTimeout(function(){
      document.querySelectorAll('iframe.ch-frame').forEach(resizeFrame);
    }, 200);
  });

  ['contextmenu','copy','cut','selectstart','dragstart'].forEach(function(ev){
    document.addEventListener(ev, function(e){
      if(e.target.tagName !== 'IFRAME') e.preventDefault();
    });
  });
  document.addEventListener('keydown', function(e){
    var k = e.key;
    if(e.ctrlKey && (k==='c'||k==='C'||k==='a'||k==='A'||k==='s'||k==='S'||k==='p'||k==='P'||k==='u'||k==='U'||k==='x'||k==='X')) e.preventDefault();
    if(k==='F12') e.preventDefault();
    if(e.ctrlKey && e.shiftKey && (k==='I'||k==='J'||k==='C')) e.preventDefault();
  });
})();
</script>
