<style>
:root{
  --bg:#f7f3ec; --text:#2c2416; --text2:#5a4e3a; --text-muted:#6B5B4B;
  --accent:#8b5e3c; --accentL:#c4956a; --accent-red:#8B2500;
  --gold:#b8860b; --goldL:#d4a84b; --gold-light:#C9A84C;
  --border:#d4c4a8; --border-light:#EDE8E0; --card:#fffdf7;
  --verseBg:#f0e8d8; --verseBd:#c4956a;
  --sbW:76px; --sbBg:#1e1a14; --sbText:#d4c4a8;
  --headGrad:linear-gradient(135deg,#2a2218 0%,#3d3225 50%,#2a2218 100%);
  --r:8px;
}
*{box-sizing:border-box;-webkit-user-select:none;user-select:none;}
html{scroll-behavior:smooth;scrollbar-width:none;-ms-overflow-style:none;}
html::-webkit-scrollbar,body::-webkit-scrollbar{display:none;width:0;height:0;}
body{margin:0;padding:0;background:var(--bg);color:var(--text);
  font-family:"Noto Serif TC","Source Han Serif TC","Songti TC",Georgia,serif;
  font-size:17px;line-height:1.8;-webkit-font-smoothing:antialiased;
  scrollbar-width:none;-ms-overflow-style:none;}
img{max-width:100%;}

#sbToggle{display:none;position:fixed;top:14px;left:14px;z-index:1001;
  width:44px;height:44px;border-radius:50%;background:var(--sbBg);
  color:var(--gold);border:1px solid var(--gold);font-size:20px;cursor:pointer;}
#sb{position:fixed;top:0;left:0;bottom:0;width:var(--sbW);background:var(--sbBg);
  color:var(--sbText);padding:24px 0 24px;display:flex;flex-direction:column;
  align-items:center;overflow-y:auto;z-index:100;border-right:1px solid #3a3024;
  scrollbar-width:none;-ms-overflow-style:none;}
#sb::-webkit-scrollbar{display:none;width:0;}

.read-progress{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);
  z-index:120;background:rgba(30,26,20,.92);color:var(--gold);padding:8px 22px;
  border-radius:30px;border:1px solid rgba(184,134,11,.5);
  box-shadow:0 4px 18px rgba(0,0,0,.25);
  font-family:"Noto Sans TC",sans-serif;font-size:13px;letter-spacing:2px;
  display:flex;align-items:center;gap:12px;pointer-events:none;user-select:none;
  backdrop-filter:blur(6px);}
.read-progress .rp-bar{width:140px;height:3px;background:rgba(212,196,168,.18);
  border-radius:2px;overflow:hidden;position:relative;}
.read-progress .rp-fill{position:absolute;top:0;left:0;bottom:0;
  background:linear-gradient(90deg,var(--gold),var(--goldL));width:0%;transition:width .3s;}
.read-progress .rp-pct{font-weight:600;min-width:38px;text-align:right;}
.read-progress .rp-label{font-size:11px;opacity:.75;letter-spacing:3px;}

.sb-nav{display:flex;flex-direction:column;gap:8px;align-items:center;padding:0 8px;}
.sb-item{display:flex;flex-direction:column;align-items:center;gap:2px;
  text-decoration:none;color:var(--sbText);padding:6px 4px;border-radius:6px;
  transition:all .2s;width:60px;}
.sb-item:hover{background:#2a2218;}
.sb-item.active{background:rgba(184,134,11,.18);box-shadow:0 0 0 1px rgba(184,134,11,.4);}
.sb-circle{width:34px;height:34px;border-radius:50%;
  border:1px solid rgba(212,196,168,.4);display:flex;align-items:center;
  justify-content:center;font-family:"Noto Sans TC",sans-serif;
  font-size:13px;font-weight:600;}
.sb-item.active .sb-circle{background:var(--gold);color:#1e1a14;
  border-color:var(--gold);box-shadow:0 0 12px rgba(184,134,11,.5);}
.sb-label{font-size:9px;line-height:1.2;text-align:center;
  font-family:"Noto Sans TC",sans-serif;letter-spacing:.5px;
  max-width:60px;overflow:hidden;}

.main{margin-left:var(--sbW);min-height:100vh;}

.site-hero{position:relative;padding:80px 40px 70px;background:var(--headGrad);
  color:#f0e8d8;text-align:center;overflow:hidden;border-bottom:3px solid var(--gold);}
.site-hero::before{content:"般若";position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);font-size:280px;font-weight:900;
  color:rgba(212,196,168,.04);white-space:nowrap;pointer-events:none;}
.site-hero .hero-meta{font-family:"Noto Sans TC",sans-serif;font-size:13px;
  color:var(--gold);letter-spacing:4px;margin-bottom:12px;}
.site-hero h1{font-size:42px;font-weight:900;margin:0 0 14px;color:var(--goldL);
  letter-spacing:6px;text-shadow:0 2px 12px rgba(0,0,0,.4);}
.site-hero .hero-sub{font-size:18px;color:#e8dcc4;font-style:italic;
  letter-spacing:1px;max-width:780px;margin:0 auto 20px;}
.site-hero .hero-tagline{font-size:14px;color:#c4a76c;
  font-family:"Noto Sans TC",sans-serif;
  border-top:1px solid rgba(196,167,108,.4);
  border-bottom:1px solid rgba(196,167,108,.4);
  padding:10px 0;max-width:560px;margin:0 auto;}

.preface{max-width:880px;margin:0 auto;padding:48px 32px 12px;}
.preface h2{font-size:24px;color:var(--accent);margin:0 0 16px;
  border-left:4px solid var(--gold);padding:6px 0 6px 14px;}
.preface p{margin:0 0 14px;color:var(--text2);line-height:1.95;}

.toc-section{max-width:1100px;margin:30px auto 0;padding:32px;}
.toc-section h2{text-align:center;font-size:28px;color:var(--accent);
  margin:0 0 8px;letter-spacing:3px;}
.toc-section .toc-desc{text-align:center;color:var(--text-muted);font-size:14px;
  font-family:"Noto Sans TC",sans-serif;margin-bottom:30px;letter-spacing:1px;}
.toc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;}
.toc-card{display:flex;gap:14px;align-items:flex-start;background:var(--card);
  border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;
  text-decoration:none;color:var(--text);transition:all .25s;
  box-shadow:0 1px 3px rgba(91,58,41,.08);}
.toc-card:hover{border-color:var(--gold);transform:translateY(-2px);
  box-shadow:0 6px 18px rgba(91,58,41,.15);}
.toc-num{flex:0 0 38px;height:38px;border-radius:50%;
  background:linear-gradient(135deg,var(--gold),var(--accentL));
  color:#fff;display:flex;align-items:center;justify-content:center;
  font-family:"Noto Sans TC",sans-serif;font-weight:700;font-size:15px;
  box-shadow:0 2px 6px rgba(184,134,11,.3);}
.toc-text{flex:1;min-width:0;}
.toc-name{font-size:17px;font-weight:700;color:var(--accent);margin-bottom:4px;}
.toc-sub{font-size:12.5px;color:var(--text-muted);line-height:1.55;
  font-family:"Noto Sans TC",sans-serif;}

.chapter{margin:48px 0 0;scroll-margin-top:20px;}
.ch-head{background:var(--headGrad);color:#f0e8d8;padding:36px 32px 28px;
  text-align:center;position:relative;border-top:1px solid var(--gold);
  border-bottom:1px solid var(--gold);}
.ch-head::after{content:"";display:block;width:80px;height:2px;
  background:var(--gold);margin:18px auto 0;}
.ch-no{font-family:"Noto Sans TC",sans-serif;font-size:13px;
  color:var(--gold);letter-spacing:4px;margin-bottom:8px;}
.ch-title{font-size:32px;font-weight:900;color:var(--goldL);letter-spacing:5px;
  margin:0 0 10px;text-shadow:0 2px 8px rgba(0,0,0,.4);}
.ch-sub{font-size:15px;color:#d4c4a8;font-style:italic;letter-spacing:1px;}
.ch-body{max-width:980px;margin:0 auto;padding:34px 28px 24px;}

.bridge{background:linear-gradient(135deg,#fffdf5,#f5ecd8);
  border:1px solid var(--border);border-left:5px solid var(--gold);
  border-radius:10px;padding:18px 24px;margin:0 0 26px;
  box-shadow:0 2px 10px rgba(91,58,41,.06);}
.bridge-outro{border-left-color:var(--accentL);
  background:linear-gradient(135deg,#fdf8e8,#f2e6c8);
  margin-top:30px;margin-bottom:14px;}
.bridge-label{display:inline-block;font-family:"Noto Sans TC",sans-serif;
  font-size:11px;background:var(--gold);color:#fff;padding:3px 12px;
  border-radius:12px;letter-spacing:2px;margin-bottom:10px;}
.bridge-outro .bridge-label{background:var(--accent);}
.bridge p{margin:0;color:var(--text2);line-height:2;font-size:15.5px;}

.ch-frame{display:block;width:100%;border:0;background:#fffdf7;
  border:1px solid var(--border);border-radius:12px;
  box-shadow:0 4px 20px rgba(91,58,41,.1);margin:0 0 8px;min-height:600px;}

.next-link{display:block;text-align:right;text-decoration:none;
  color:var(--accent);font-family:"Noto Sans TC",sans-serif;
  font-size:13.5px;letter-spacing:1px;padding:10px 18px;
  border-top:1px dashed var(--border);margin-top:8px;transition:color .2s;}
.next-link:hover{color:var(--gold);}

.site-footer{margin-top:60px;background:var(--headGrad);color:#c4a76c;
  text-align:center;padding:36px 24px;font-family:"Noto Sans TC",sans-serif;
  font-size:13px;letter-spacing:2px;border-top:2px solid var(--gold);}
.site-footer .om{font-size:22px;color:var(--gold);margin-bottom:8px;}

#backTop{position:fixed;bottom:24px;right:24px;z-index:101;
  width:44px;height:44px;border-radius:50%;background:var(--gold);color:#fff;
  border:none;font-size:20px;cursor:pointer;display:none;
  box-shadow:0 4px 16px rgba(184,134,11,.4);}
#backTop:hover{background:var(--accent);}
#backTop.show{display:block;}

@media (max-width:900px){
  #sb{transform:translateX(-100%);transition:transform .25s;}
  #sb.open{transform:translateX(0);}
  #sbToggle{display:flex;align-items:center;justify-content:center;}
  .main{margin-left:0;}
  .site-hero{padding:60px 24px 50px;}
  .site-hero h1{font-size:30px;letter-spacing:3px;}
  .site-hero::before{font-size:160px;}
  .ch-head{padding:28px 20px 22px;}
  .ch-title{font-size:24px;letter-spacing:3px;}
  .ch-body{padding:24px 16px;}
  .toc-section{padding:24px 16px;}
  .preface{padding:30px 18px 6px;}
}
@media (max-width:600px){
  body{font-size:15.5px;}
  .site-hero h1{font-size:24px;}
  .ch-title{font-size:21px;}
}

/* === 1.2x 舒適閱讀字級 === OUTER === */
body{font-size:20px!important;}
.hero-title,.site-hero h1{font-size:56px!important;}
.hero-subtitle,.site-hero .hero-subtitle{font-size:20px!important;}
.hero-sub,.site-hero .hero-sub,.hero-meta{font-size:18px!important;}
.preface p{font-size:19px!important;line-height:2.1!important;}
.toc-title{font-size:34px!important;}
.toc-name{font-size:19.5px!important;line-height:1.7!important;}
.bridge p{font-size:18.5px!important;line-height:2.1!important;}
.ch-name{font-size:34px!important;}
.read-progress{font-size:14px!important;padding:9px 24px!important;}

<script>
(function(){
  var rpFill = document.getElementById('rpFill');
  var rpPct  = document.getElementById('rpPct');
  function updateProgress(){
    var sh = document.documentElement.scrollHeight - window.innerHeight;
    var pct = sh > 0 ? Math.min(100, Math.max(0, window.scrollY / sh * 100)) : 0;
    if(rpFill) rpFill.style.width = pct + '%';
    if(rpPct)  rpPct.textContent  = Math.round(pct) + '%';
  }
  var sbItems = document.querySelectorAll('.sb-item');
  var chapters = document.querySelectorAll('.chapter');
  function updateActive(){
    var fh = window.innerHeight * 0.35, act = null;
    chapters.forEach(function(c){
      if(c.getBoundingClientRect().top < fh) act = c;
    });
    sbItems.forEach(function(it){ it.classList.remove('active'); });
    if(act){
      var id = act.id.replace('chapter-','');
      var match = document.querySelector('.sb-item[data-ch="'+id+'"]');
      if(match){
        match.classList.add('active');
        var sb = document.getElementById('sb');
        var rect = match.getBoundingClientRect();
        if(rect.top < 60 || rect.bottom > window.innerHeight - 30){
          sb.scrollTo({top: match.offsetTop - 100, behavior:'smooth'});
        }
      }
    }
  }
  var bt = document.getElementById('backTop');
  function updateBackTop(){
    if(window.scrollY > 600) bt.classList.add('show');
    else bt.classList.remove('show');
  }
  bt.onclick = function(){ window.scrollTo({top:0, behavior:'smooth'}); };
  var sb = document.getElementById('sb');
  document.getElementById('sbToggle').onclick = function(){ sb.classList.toggle('open'); };
  document.querySelectorAll('.sb-item').forEach(function(it){
    it.addEventListener('click', function(){ sb.classList.remove('open'); });
  });
  window.addEventListener('scroll', function(){
    updateProgress(); updateActive(); updateBackTop();
  }, {passive:true});
  updateProgress(); updateActive(); updateBackTop();

  function resizeFrame(f){
    try{
      var d = f.contentDocument || f.contentWindow.document;
      if(!d || !d.body) return;
      var h = Math.max(d.documentElement.scrollHeight, d.body.scrollHeight);
      if(h > 100) f.style.height = (h + 24) + 'px';
    }catch(e){}
  }
  function setupFrame(f){
    var tries = 0;
    function tick(){
      tries++;
      resizeFrame(f);
      if(tries < 30) setTimeout(tick, 200);
    }
    if(f.contentDocument && f.contentDocument.readyState === 'complete') tick();
    else f.addEventListener('load', tick);
  }
  document.querySelectorAll('iframe.ch-frame').forEach(setupFrame);
  var rzT;
  window.addEventListener('resize', function(){
    clearTimeout(rzT);
    rzT = setTimeout(function(){
      document.querySelectorAll('iframe.ch-frame').forEach(resizeFrame);
    }, 200);
  });

  ['contextmenu','copy','cut','selectstart','dragstart'].forEach(function(ev){
    document.addEventListener(ev, function(e){
      if(e.target.tagName !== 'IFRAME') e.preventDefault();
    });
  });
  document.addEventListener('keydown', function(e){
    var k = e.key;
    if(e.ctrlKey && (k==='c'||k==='C'||k==='a'||k==='A'||k==='s'||k==='S'||k==='p'||k==='P'||k==='u'||k==='U'||k==='x'||k==='X')) e.preventDefault();
    if(k==='F12') e.preventDefault();
    if(e.ctrlKey && e.shiftKey && (k==='I'||k==='J'||k==='C')) e.preventDefault();
  });
})();
</script>

        return '%'+('00'+c.charCodeAt(0).toString(16)).slice(-2);
      }).join(''));
    }catch(e){return '';}
  }
  var ns=document.querySelectorAll('[data-wy-t]');
  for(var i=0;i<ns.length;i++){
    ns[i].textContent=dec(ns[i].getAttribute('data-wy-t'));
    ns[i].removeAttribute('data-wy-t');
  }
})();</script>
<script data-wy-obfs="v2">
(function(){
  /* 第四層：file:// 協定偵測（必須最優先，放在解碼前） */
  if(location.protocol==='file:'){
    var sh=document.getElementById('wy-offline-shield');
    if(sh){ sh.style.display='flex'; }
    try{ document.querySelectorAll('iframe[data-src],iframe.ch-frame').forEach(function(f){ f.remove(); }); }catch(e){}
    return;
  }
  /* 第一層：base64 → srcdoc runtime 解碼 */
  try{
    var dec=new TextDecoder('utf-8');
    document.querySelectorAll('iframe[data-src]').forEach(function(f){
      try{
        var b64=f.getAttribute('data-src');
        var bin=atob(b64);
        var bytes=new Uint8Array(bin.length);
        for(var i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i);
        f.setAttribute('srcdoc', dec.decode(bytes));
        f.removeAttribute('data-src');
      }catch(e){}
    });
  }catch(e){}
  /* 第二層：鍵盤快捷鍵 · Cmd/Ctrl 雙覆蓋 */
  document.addEventListener('keydown',function(e){
    var k=(e.key||'').toLowerCase();
    var mod=e.ctrlKey||e.metaKey;
    if(mod && ['s','p','u','a','c','x'].indexOf(k)!==-1){ e.preventDefault();e.stopPropagation();}
    if(k==='f12') e.preventDefault();
    if(mod && e.shiftKey && ['i','j','c','k'].indexOf(k)!==-1){ e.preventDefault();}
  },true);
  /* 第三層：列印攔截 */
  window.addEventListener('beforeprint',function(){ document.body.style.visibility='hidden'; });
  window.addEventListener('afterprint',function(){ document.body.style.visibility=''; });
  try{ window.print=function(){ return false; }; }catch(e){}
})();
</script>
