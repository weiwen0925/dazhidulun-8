<title>大智度論 · 卷八 · 第一至十品 彙整</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700;900&amp;family=Noto+Sans+TC:wght@300;400;500;700&amp;display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#f7f3ec; --text:#2c2416; --text2:#5a4e3a; --text-muted:#6B5B4B;
  --accent:#8b5e3c; --accentL:#c4956a; --accent-red:#8B2500;
  --gold:#b8860b; --goldL:#d4a84b; --gold-light:#C9A84C;
  --border:#d4c4a8; --border-light:#EDE8E0; --card:#fffdf7;
  --verseBg:#f0e8d8; --verseBd:#c4956a;
  --sbW:76px; --sbBg:#1e1a14; --sbText:#d4c4a8;
  --headGrad:linear-gradient(135deg,#2a2218 0%,#3d3225 50%,#2a2218 100%);
  --r:8px;
}
*{box-sizing:border-box;-webkit-user-select:none;user-select:none;}
html{scroll-behavior:smooth;scrollbar-width:none;-ms-overflow-style:none;}
html::-webkit-scrollbar,body::-webkit-scrollbar{display:none;width:0;height:0;}
body{margin:0;padding:0;background:var(--bg);color:var(--text);
  font-family:"Noto Serif TC","Source Han Serif TC","Songti TC",Georgia,serif;
  font-size:17px;line-height:1.8;-webkit-font-smoothing:antialiased;
  scrollbar-width:none;-ms-overflow-style:none;}
img{max-width:100%;}

#sbToggle{display:none;position:fixed;top:14px;left:14px;z-index:1001;
  width:44px;height:44px;border-radius:50%;background:var(--sbBg);
  color:var(--gold);border:1px solid var(--gold);font-size:20px;cursor:pointer;}
#sb{position:fixed;top:0;left:0;bottom:0;width:var(--sbW);background:var(--sbBg);
  color:var(--sbText);padding:24px 0 24px;display:flex;flex-direction:column;
  align-items:center;overflow-y:auto;z-index:100;border-right:1px solid #3a3024;
  scrollbar-width:none;-ms-overflow-style:none;}
#sb::-webkit-scrollbar{display:none;width:0;}

.read-progress{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);
  z-index:120;background:rgba(30,26,20,.92);color:var(--gold);padding:8px 22px;
  border-radius:30px;border:1px solid rgba(184,134,11,.5);
  box-shadow:0 4px 18px rgba(0,0,0,.25);
  font-family:"Noto Sans TC",sans-serif;font-size:13px;letter-spacing:2px;
  display:flex;align-items:center;gap:12px;pointer-events:none;user-select:none;
  backdrop-filter:blur(6px);}
.read-progress .rp-bar{width:140px;height:3px;background:rgba(212,196,168,.18);
  border-radius:2px;overflow:hidden;position:relative;}
.read-progress .rp-fill{position:absolute;top:0;left:0;bottom:0;
  background:linear-gradient(90deg,var(--gold),var(--goldL));width:0%;transition:width .3s;}
.read-progress .rp-pct{font-weight:600;min-width:38px;text-align:right;}
.read-progress .rp-label{font-size:11px;opacity:.75;letter-spacing:3px;}

.sb-nav{display:flex;flex-direction:column;gap:8px;align-items:center;padding:0 8px;}
.sb-item{display:flex;flex-direction:column;align-items:center;gap:2px;
  text-decoration:none;color:var(--sbText);padding:6px 4px;border-radius:6px;
  transition:all .2s;width:60px;}
.sb-item:hover{background:#2a2218;}
.sb-item.active{background:rgba(184,134,11,.18);box-shadow:0 0 0 1px rgba(184,134,11,.4);}
.sb-circle{width:34px;height:34px;border-radius:50%;
  border:1px solid rgba(212,196,168,.4);display:flex;align-items:center;
  justify-content:center;font-family:"Noto Sans TC",sans-serif;
  font-size:13px;font-weight:600;}
.sb-item.active .sb-circle{background:var(--gold);color:#1e1a14;
  border-color:var(--gold);box-shadow:0 0 12px rgba(184,134,11,.5);}
.sb-label{font-size:9px;line-height:1.2;text-align:center;
  font-family:"Noto Sans TC",sans-serif;letter-spacing:.5px;
  max-width:60px;overflow:hidden;}

.main{margin-left:var(--sbW);min-height:100vh;}

.site-hero{position:relative;padding:80px 40px 70px;background:var(--headGrad);
  color:#f0e8d8;text-align:center;overflow:hidden;border-bottom:3px solid var(--gold);}
.site-hero::before{content:"般若";position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);font-size:280px;font-weight:900;
  color:rgba(212,196,168,.04);white-space:nowrap;pointer-events:none;}
.site-hero .hero-meta{font-family:"Noto Sans TC",sans-serif;font-size:13px;
  color:var(--gold);letter-spacing:4px;margin-bottom:12px;}
.site-hero h1{font-size:42px;font-weight:900;margin:0 0 14px;color:var(--goldL);
  letter-spacing:6px;text-shadow:0 2px 12px rgba(0,0,0,.4);}
.site-hero .hero-sub{font-size:18px;color:#e8dcc4;font-style:italic;
  letter-spacing:1px;max-width:780px;margin:0 auto 20px;}
.site-hero .hero-tagline{font-size:14px;color:#c4a76c;
  font-family:"Noto Sans TC",sans-serif;
  border-top:1px solid rgba(196,167,108,.4);
  border-bottom:1px solid rgba(196,167,108,.4);
  padding:10px 0;max-width:560px;margin:0 auto;}

.preface{max-width:880px;margin:0 auto;padding:48px 32px 12px;}
.preface h2{font-size:24px;color:var(--accent);margin:0 0 16px;
  border-left:4px solid var(--gold);padding:6px 0 6px 14px;}
.preface p{margin:0 0 14px;color:var(--text2);line-height:1.95;}

.toc-section{max-width:1100px;margin:30px auto 0;padding:32px;}
.toc-section h2{text-align:center;font-size:28px;color:var(--accent);
  margin:0 0 8px;letter-spacing:3px;}
.toc-section .toc-desc{text-align:center;color:var(--text-muted);font-size:14px;
  font-family:"Noto Sans TC",sans-serif;margin-bottom:30px;letter-spacing:1px;}
.toc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;}
.toc-card{display:flex;gap:14px;align-items:flex-start;background:var(--card);
  border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;
  text-decoration:none;color:var(--text);transition:all .25s;
  box-shadow:0 1px 3px rgba(91,58,41,.08);}
.toc-card:hover{border-color:var(--gold);transform:translateY(-2px);
  box-shadow:0 6px 18px rgba(91,58,41,.15);}
.toc-num{flex:0 0 38px;height:38px;border-radius:50%;
  background:linear-gradient(135deg,var(--gold),var(--accentL));
  color:#fff;display:flex;align-items:center;justify-content:center;
  font-family:"Noto Sans TC",sans-serif;font-weight:700;font-size:15px;
  box-shadow:0 2px 6px rgba(184,134,11,.3);}
.toc-text{flex:1;min-width:0;}
.toc-name{font-size:17px;font-weight:700;color:var(--accent);margin-bottom:4px;}
.toc-sub{font-size:12.5px;color:var(--text-muted);line-height:1.55;
  font-family:"Noto Sans TC",sans-serif;}

.chapter{margin:48px 0 0;scroll-margin-top:20px;}
.ch-head{background:var(--headGrad);color:#f0e8d8;padding:36px 32px 28px;
  text-align:center;position:relative;border-top:1px solid var(--gold);
  border-bottom:1px solid var(--gold);}
.ch-head::after{content:"";display:block;width:80px;height:2px;
  background:var(--gold);margin:18px auto 0;}
.ch-no{font-family:"Noto Sans TC",sans-serif;font-size:13px;
  color:var(--gold);letter-spacing:4px;margin-bottom:8px;}
.ch-title{font-size:32px;font-weight:900;color:var(--goldL);letter-spacing:5px;
  margin:0 0 10px;text-shadow:0 2px 8px rgba(0,0,0,.4);}
.ch-sub{font-size:15px;color:#d4c4a8;font-style:italic;letter-spacing:1px;}
.ch-body{max-width:980px;margin:0 auto;padding:34px 28px 24px;}

.bridge{background:linear-gradient(135deg,#fffdf5,#f5ecd8);
  border:1px solid var(--border);border-left:5px solid var(--gold);
  border-radius:10px;padding:18px 24px;margin:0 0 26px;
  box-shadow:0 2px 10px rgba(91,58,41,.06);}
.bridge-outro{border-left-color:var(--accentL);
  background:linear-gradient(135deg,#fdf8e8,#f2e6c8);
  margin-top:30px;margin-bottom:14px;}
.bridge-label{display:inline-block;font-family:"Noto Sans TC",sans-serif;
  font-size:11px;background:var(--gold);color:#fff;padding:3px 12px;
  border-radius:12px;letter-spacing:2px;margin-bottom:10px;}
.bridge-outro .bridge-label{background:var(--accent);}
.bridge p{margin:0;color:var(--text2);line-height:2;font-size:15.5px;}

.ch-frame{display:block;width:100%;border:0;background:#fffdf7;
  border:1px solid var(--border);border-radius:12px;
  box-shadow:0 4px 20px rgba(91,58,41,.1);margin:0 0 8px;min-height:600px;}

.next-link{display:block;text-align:right;text-decoration:none;
  color:var(--accent);font-family:"Noto Sans TC",sans-serif;
  font-size:13.5px;letter-spacing:1px;padding:10px 18px;
  border-top:1px dashed var(--border);margin-top:8px;transition:color .2s;}
.next-link:hover{color:var(--gold);}

.site-footer{margin-top:60px;background:var(--headGrad);color:#c4a76c;
  text-align:center;padding:36px 24px;font-family:"Noto Sans TC",sans-serif;
  font-size:13px;letter-spacing:2px;border-top:2px solid var(--gold);}
.site-footer .om{font-size:22px;color:var(--gold);margin-bottom:8px;}

#backTop{position:fixed;bottom:24px;right:24px;z-index:101;
  width:44px;height:44px;border-radius:50%;background:var(--gold);color:#fff;
  border:none;font-size:20px;cursor:pointer;display:none;
  box-shadow:0 4px 16px rgba(184,134,11,.4);}
#backTop:hover{background:var(--accent);}
#backTop.show{display:block;}

@media (max-width:900px){
  #sb{transform:translateX(-100%);transition:transform .25s;}
  #sb.open{transform:translateX(0);}
  #sbToggle{display:flex;align-items:center;justify-content:center;}
  .main{margin-left:0;}
  .site-hero{padding:60px 24px 50px;}
  .site-hero h1{font-size:30px;letter-spacing:3px;}
  .site-hero::before{font-size:160px;}
  .ch-head{padding:28px 20px 22px;}
  .ch-title{font-size:24px;letter-spacing:3px;}
  .ch-body{padding:24px 16px;}
  .toc-section{padding:24px 16px;}
  .preface{padding:30px 18px 6px;}
}
@media (max-width:600px){
  body{font-size:15.5px;}
  .site-hero h1{font-size:24px;}
  .ch-title{font-size:21px;}
}

/* === 1.2x 舒適閱讀字級 === OUTER === */
body{font-size:20px!important;}
.hero-title,.site-hero h1{font-size:56px!important;}
.hero-subtitle,.site-hero .hero-subtitle{font-size:20px!important;}
.hero-sub,.site-hero .hero-sub,.hero-meta{font-size:18px!important;}
.preface p{font-size:19px!important;line-height:2.1!important;}
.toc-title{font-size:34px!important;}
.toc-name{font-size:19.5px!important;line-height:1.7!important;}
.bridge p{font-size:18.5px!important;line-height:2.1!important;}
.ch-name{font-size:34px!important;}
.read-progress{font-size:14px!important;padding:9px 24px!important;}
</style>

:root{
  --bg:#f7f3ec;--text:#2c2416;--text2:#5a4e3a;--text-muted:#6B5B4B;
  --accent:#8b5e3c;--accentL:#c4956a;--accent-red:#8B2500;
  --gold:#b8860b;--goldL:#d4a84b;--gold-light:#C9A84C;
  --border:#d4c4a8;--border-light:#EDE8E0;--card:#fffdf7;
  --verseBg:#f0e8d8;--verseBd:#c4956a;
  --sbW:76px;--sbBg:#1e1a14;--sbText:#d4c4a8;
  --headGrad:linear-gradient(135deg,#2a2218 0%,#3d3225 50%,#2a2218 100%);
  --r:8px;
}
*{box-sizing:border-box;margin:0;padding:0;
  -webkit-user-select:none;-moz-user-select:none;-ms-user-select:none;user-select:none;
  -webkit-touch-callout:none;-webkit-user-drag:none;}
html,body{
  scrollbar-width:none;-ms-overflow-style:none;
}
html::-webkit-scrollbar,body::-webkit-scrollbar{display:none;width:0;height:0;}
body{
  font-family:&quot;Noto Serif TC&quot;,&quot;Source Han Serif TC&quot;,&quot;Songti TC&quot;,Georgia,serif;
  background:var(--bg);color:var(--text);
  line-height:1.8;font-size:17px;
  min-height:100vh;
}

/* Sidebar */
#sb{
  position:fixed;top:0;left:0;width:var(--sbW);height:100vh;
  background:var(--sbBg);color:var(--sbText);
  display:flex;flex-direction:column;align-items:center;
  padding:22px 0;z-index:100;
  border-right:1px solid rgba(184,134,11,.18);
}
.sb-title{
  font-family:&quot;Noto Sans TC&quot;,sans-serif;
  writing-mode:vertical-rl;
  letter-spacing:4px;font-size:12px;
  color:var(--gold);opacity:.85;
  margin-bottom:22px;
}
.sb-nav{display:flex;flex-direction:column;gap:14px;flex:1;overflow-y:auto;width:100%;align-items:center;}
.sb-nav::-webkit-scrollbar{display:none;}
.sb-item{
  display:flex;flex-direction:column;align-items:center;gap:4px;
  cursor:pointer;text-decoration:none;color:var(--sbText);
  padding:6px 0;width:100%;transition:all .25s;
}
.sb-circle{
  width:34px;height:34px;border-radius:50%;
  border:1px solid rgba(212,196,168,.4);
  display:flex;align-items:center;justify-content:center;
  font-family:&quot;Noto Sans TC&quot;,sans-serif;font-size:14px;font-weight:600;
  transition:all .25s;
}
.sb-label{font-size:10px;letter-spacing:1px;opacity:.75;}
.sb-item.active .sb-circle,.sb-item:hover .sb-circle{
  background:var(--gold);color:#fff;border-color:var(--gold);
  box-shadow:0 0 14px rgba(184,134,11,.55);
}
.sb-item.active .sb-label,.sb-item:hover .sb-label{opacity:1;color:var(--goldL);}

#sbToggle{
  display:none;position:fixed;top:14px;left:14px;z-index:110;
  background:var(--sbBg);color:var(--gold);border:1px solid var(--gold);
  width:40px;height:40px;border-radius:50%;font-size:18px;cursor:pointer;
}

/* Main */
.main{margin-left:var(--sbW);padding:0 0 80px;}

/* Hero */
.site-hero{
  position:relative;background:var(--headGrad);color:#fff;
  padding:78px 40px 72px;text-align:center;overflow:hidden;
}
.site-hero::before{
  content:&quot;放光&quot;;position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  font-family:&quot;Noto Serif TC&quot;,serif;font-weight:900;
  font-size:clamp(200px,30vw,380px);letter-spacing:30px;
  color:#fff;opacity:.035;white-space:nowrap;pointer-events:none;
}
.hero-kicker{
  font-family:&quot;Noto Sans TC&quot;,sans-serif;
  font-size:12px;letter-spacing:8px;color:var(--goldL);
  margin-bottom:18px;
}
.hero-title{
  font-size:clamp(32px,5vw,52px);font-weight:900;
  color:#fff;margin-bottom:14px;letter-spacing:6px;
}
.hero-sub{
  font-size:17px;color:#e8dcc4;letter-spacing:3px;margin-bottom:10px;
}
.hero-meta{
  font-size:13px;color:#c4a87a;opacity:.85;letter-spacing:2px;
  margin-top:22px;
}
.hero-meta span{margin:0 10px;}

/* Preface */
.preface{
  max-width:880px;margin:42px auto 0;padding:0 36px;
}
.preface-title{
  font-family:&quot;Noto Sans TC&quot;,sans-serif;
  font-size:13px;letter-spacing:6px;color:var(--gold);
  text-align:center;margin-bottom:14px;
}
.preface-body{
  background:var(--card);border:1px solid var(--border);
  border-left:4px solid var(--gold);border-radius:10px;
  padding:22px 28px;color:var(--text2);line-height:2;
  box-shadow:0 2px 10px rgba(91,58,41,.06);
}
.preface-body p{margin-bottom:12px;}
.preface-body p:last-child{margin-bottom:0;}

/* TOC */
.toc-section{
  max-width:1100px;margin:54px auto 40px;padding:0 36px;
}
.toc-title{
  text-align:center;font-size:22px;letter-spacing:12px;
  color:var(--accent);margin-bottom:8px;font-weight:700;
}
.toc-desc{
  text-align:center;font-size:13px;color:var(--text-muted);
  letter-spacing:3px;margin-bottom:28px;
}
.toc-grid{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:16px;
}
.toc-card{
  background:var(--card);border:1px solid var(--border);border-radius:10px;
  padding:16px 20px;display:flex;align-items:flex-start;gap:14px;
  cursor:pointer;text-decoration:none;color:var(--text);
  transition:all .25s;box-shadow:0 1px 3px rgba(0,0,0,.05);
}
.toc-card:hover{
  transform:translateY(-2px);
  box-shadow:0 6px 18px rgba(184,134,11,.18);
  border-color:var(--gold);
}
.toc-num{
  min-width:36px;height:36px;border-radius:50%;
  background:var(--gold);color:#fff;
  display:flex;align-items:center;justify-content:center;
  font-family:&quot;Noto Sans TC&quot;,sans-serif;font-weight:700;font-size:15px;
}
.toc-info{flex:1;}
.toc-name{font-weight:600;font-size:15.5px;margin-bottom:4px;color:var(--accent);}
.toc-sub{font-size:12.5px;color:var(--text-muted);letter-spacing:1px;}

/* Chapter */
.chapter{margin:46px 0;scroll-margin-top:20px;}
.ch-head{
  background:var(--headGrad);color:#fff;
  padding:42px 36px;text-align:center;
  border-top:3px solid var(--gold);
  position:relative;
}
.ch-head::after{
  content:&quot;&quot;;position:absolute;bottom:14px;left:50%;transform:translateX(-50%);
  width:60px;height:1px;background:var(--gold);
}
.ch-num{
  font-family:&quot;Noto Sans TC&quot;,sans-serif;
  font-size:12px;letter-spacing:6px;color:var(--goldL);margin-bottom:12px;
}
.ch-name{
  font-size:28px;font-weight:700;letter-spacing:4px;color:#fff;margin-bottom:8px;
}
.ch-sub{
  font-size:13px;color:#c4a87a;letter-spacing:2px;opacity:.9;
}
.ch-body{
  max-width:860px;margin:0 auto;padding:38px 32px;
}

/* Bridge */
.bridge{
  background:linear-gradient(135deg,#fffdf5,#f5ecd8);
  border:1px solid var(--border);
  border-left:5px solid var(--gold);
  border-radius:10px;
  padding:18px 24px;margin:0 0 26px;
  box-shadow:0 2px 10px rgba(91,58,41,.06);
}
.bridge-outro{
  border-left-color:var(--accentL);
  background:linear-gradient(135deg,#fdf8e8,#f2e6c8);
  margin-top:30px;margin-bottom:14px;
}
.bridge-label{
  display:inline-block;font-family:&quot;Noto Sans TC&quot;,sans-serif;font-size:11px;
  background:var(--gold);color:#fff;
  padding:3px 12px;border-radius:12px;letter-spacing:2px;margin-bottom:10px;
}
.bridge-outro .bridge-label{background:var(--accent);}
.bridge p{margin:0 0 8px;color:var(--text2);line-height:2;font-size:15.5px;}
.bridge p:last-child{margin-bottom:0;}

/* h2 section */
h2{
  font-size:22px;font-weight:700;color:var(--accent);
  margin:32px 0 14px;padding:10px 0 10px 20px;
  border-left:4px solid var(--gold);
  background:linear-gradient(90deg,rgba(184,134,11,.08),transparent);
  letter-spacing:2px;
}
h3{
  font-size:17.5px;font-weight:600;color:var(--text);
  margin:24px 0 10px;padding-bottom:6px;
  border-bottom:1px solid var(--border-light);
}
h4{font-size:16px;color:var(--text2);margin:16px 0 8px;}

p{margin:0 0 12px;color:var(--text);}

/* Classical text / original sutra */
.classical-text{
  background:#FFFDF5;border:1px solid #E8E0D0;border-radius:10px;
  padding:18px 24px;margin:16px 0;line-height:1.95;position:relative;
}
.text-label{
  display:inline-block;background:var(--accent);color:#fff;
  font-family:&quot;Noto Sans TC&quot;,sans-serif;font-size:11px;
  padding:3px 12px;border-radius:12px;letter-spacing:3px;
  margin-bottom:12px;
}
.text-label.jing{background:var(--accent-red);}
.text-label.lun{background:var(--accent);}

/* Q&amp;A */
.qa{margin:14px 0;}
.qa .q{
  background:rgba(100,140,180,.08);border-left:3px solid #5b7a9b;
  padding:10px 16px;margin-bottom:6px;border-radius:0 6px 6px 0;
  color:#3a4e66;font-weight:500;
}
.qa .a{
  padding:8px 16px 8px 20px;color:var(--text);line-height:1.95;
}
.qa .a p{margin-bottom:8px;}

/* Card / insight */
.insight,.card,.commentary{
  background:var(--card);border:1px solid var(--border);border-radius:8px;
  padding:16px 22px;margin:14px 0;
  box-shadow:0 1px 3px rgba(0,0,0,.08);
}
.insight-title,.card-title{
  font-size:15px;font-weight:700;color:var(--accent);
  margin-bottom:8px;letter-spacing:1px;
}

/* Four-grid */
.four-grid{
  display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin:16px 0;
}
.four-grid .cell{
  background:var(--card);border:1px solid var(--border);border-radius:8px;
  padding:14px 18px;
}
.four-grid .cell-title{
  font-weight:700;color:var(--accent);margin-bottom:6px;font-size:15px;
}
.four-grid .cell-desc{color:var(--text2);font-size:14.5px;line-height:1.85;}

/* Metaphor */
.metaphor{
  background:linear-gradient(135deg,#fff8e8,#f5ead0);
  border:1px dashed var(--accentL);border-radius:10px;
  padding:18px 24px;margin:18px 0;
}
.metaphor-label{
  display:inline-block;background:var(--accentL);color:#fff;
  font-family:&quot;Noto Sans TC&quot;,sans-serif;font-size:11px;
  padding:3px 12px;border-radius:12px;letter-spacing:2px;margin-bottom:10px;
}

/* Verse */
.verse{
  background:var(--verseBg);border-left:4px solid var(--verseBd);
  padding:14px 22px;margin:16px 0;line-height:1.9;
  white-space:normal;text-align:center;font-style:italic;
}

strong,b{color:var(--accent-red);font-weight:700;}

/* Flow */
.flow{
  display:flex;flex-wrap:wrap;align-items:center;justify-content:center;gap:10px;
  background:var(--card);border:1px solid var(--border);border-radius:10px;
  padding:14px 18px;margin:14px 0;
}
.flow-box{
  background:var(--bg);border:1px solid var(--border);border-radius:8px;
  padding:10px 16px;min-width:100px;text-align:center;font-size:14.5px;
}
.flow-arrow{color:var(--gold);font-weight:700;font-size:18px;}

/* Next link */
.next-link{
  display:block;text-align:center;margin:36px auto 0;max-width:320px;
  padding:12px 22px;border:1px solid var(--gold);border-radius:30px;
  color:var(--accent);text-decoration:none;font-size:14px;letter-spacing:3px;
  background:var(--card);transition:all .25s;
}
.next-link:hover{background:var(--gold);color:#fff;}

/* Progress capsule */
.read-progress{
  position:fixed;left:50%;bottom:18px;transform:translateX(-50%);
  z-index:120;background:rgba(30,26,20,.92);color:var(--gold);
  padding:8px 22px;border-radius:30px;
  border:1px solid rgba(184,134,11,.5);
  box-shadow:0 4px 18px rgba(0,0,0,.25);
  font-family:&quot;Noto Sans TC&quot;,sans-serif;
  font-size:13px;letter-spacing:2px;
  display:flex;align-items:center;gap:12px;
  pointer-events:none;user-select:none;
  backdrop-filter:blur(6px);
}
.read-progress .rp-bar{width:140px;height:3px;background:rgba(212,196,168,.18);
  border-radius:2px;overflow:hidden;position:relative;}
.read-progress .rp-fill{position:absolute;top:0;left:0;bottom:0;
  background:linear-gradient(90deg,var(--gold),var(--goldL));
  width:0%;transition:width .3s;}
.read-progress .rp-pct{font-weight:600;min-width:38px;text-align:right;}
.read-progress .rp-label{font-size:11px;opacity:.75;letter-spacing:3px;}

/* Back to top */
#backTop{
  position:fixed;right:20px;bottom:20px;
  width:44px;height:44px;border-radius:50%;
  background:var(--sbBg);color:var(--gold);border:1px solid var(--gold);
  font-size:18px;cursor:pointer;z-index:110;
  opacity:0;pointer-events:none;transition:opacity .3s;
}
#backTop.show{opacity:1;pointer-events:auto;}

/* Footer */
.site-footer{
  text-align:center;padding:32px 20px;color:var(--text-muted);
  font-size:12.5px;letter-spacing:2px;border-top:1px solid var(--border-light);
  margin-top:40px;
}

/* Responsive */
@media(max-width:900px){
  #sb{transform:translateX(-100%);transition:transform .3s;}
  #sb.open{transform:translateX(0);}
  #sbToggle{display:block;}
  .main{margin-left:0;}
  .ch-body{padding:28px 20px;}
  .four-grid{grid-template-columns:1fr;}
  .hero-title{font-size:30px;letter-spacing:4px;}
}
@media(max-width:600px){
  body{font-size:15.5px;}
  .hero-title{font-size:26px;}
  h2{font-size:19px;}
  .ch-name{font-size:22px;}
}

/* ── 基礎：隱藏滾動條、防複製 ── */
html,body{margin:0;padding:0;background:transparent;
  overflow:hidden!important;
  scrollbar-width:none!important;-ms-overflow-style:none!important;
  -webkit-user-select:none!important;-moz-user-select:none!important;
  -ms-user-select:none!important;user-select:none!important;
  -webkit-touch-callout:none!important;}
html::-webkit-scrollbar,body::-webkit-scrollbar,
*::-webkit-scrollbar{display:none!important;width:0!important;height:0!important;}
*{-webkit-user-select:none!important;-moz-user-select:none!important;
  -ms-user-select:none!important;user-select:none!important;
  -webkit-user-drag:none!important;
  scrollbar-width:none!important;}
body{padding:0 8px;}
#sb,#sbToggle,#backTop,aside.sb{display:none!important;}
.main{margin-left:0!important;}
img{-webkit-user-drag:none!important;pointer-events:none;}

/* ── 高度自適應（避免 iframe 內出現多餘空白） ── */
html,body,.main,main,.container,.wrap,.wrapper,.page,#app,#root{
  min-height:0!important;height:auto!important;}
.site-footer,footer.site-footer{min-height:0!important;}

/* ── 全面取消斜體：經典原典用正體更莊重 ── */
*{font-style:normal!important;}

/* ── 內容區底色統一為暖色調，避免純白 ── */
.ch-body{
  background:var(--bg,#f7f3ec)!important;
  max-width:980px!important;
  margin:0 auto!important;
  padding:36px 28px 48px!important;}

/* ── 章標題統一為深色漸層居中樣式 ── */
.ch-head{
  background:var(--headGrad,linear-gradient(135deg,#2a2218 0%,#3d3225 50%,#2a2218 100%))!important;
  padding:42px 32px!important;
  text-align:center!important;
  border-left:none!important;
  border-radius:0!important;
  position:relative!important;}
.ch-head .ch-num{
  font-size:12px!important;color:var(--gold,#b8860b)!important;
  letter-spacing:3px!important;opacity:.8!important;}
.ch-head .ch-title,
.ch-head .ch-name{
  font-size:30px!important;font-weight:900!important;
  color:#fff!important;letter-spacing:3px!important;}
.ch-head .ch-sub,
.ch-head .ch-desc{
  font-size:14.5px!important;color:var(--goldL,#d4a84b)!important;
  opacity:.85!important;max-width:600px!important;margin:0 auto!important;}

/* ── TOC 卡片統一底色 + 標題居中 ── */
.toc-card{background:var(--card,#fffdf7)!important;}
.toc-section{background:var(--card,#fffdf7)!important;}
.toc-title,.toc-desc,.toc-header{text-align:center!important;}

/* ── 所有白底區塊統一為暖色（避免純白） ── */
.card,.insight,.commentary,.note,.metaphor,
.col,.flow,.compare-table,.cell,.col-card{
  background:var(--card,#fffdf7)!important;}

/* ── 區塊標題強調色 ── */
.card-title,.col-title,.cell-title{
  color:var(--accent,#8b5e3c)!important;font-weight:700!important;}

/* ── 公式區塊：含 br 的 span 需 inline-block 避免邊框重疊 ── */
span[style*=&quot;border&quot;]{
  display:inline-block!important;vertical-align:middle!important;margin:6px 4px!important;}

/* ── 內文字體統一為 17px ── */
.card-content,.col-content,.section-content,
.insight,.commentary,.note,.cell-content,
.flow-step,.compare-table td{
  font-size:17px!important;line-height:1.8!important;}

/* ── 重點詞語強調 ── */
.card-content strong,.col-content strong,
.cell-content strong,.section-content strong,
.insight strong{color:var(--accent-red,#8B2500)!important;}

/* ── 節標題統一：左金邊 + 漸層背景色塊 ── */
.section-title,h3.section-title{
  font-size:18px!important;font-weight:700!important;
  color:var(--accent,#8b5e3c)!important;
  padding:10px 0 10px 20px!important;
  border-left:4px solid var(--gold,#b8860b)!important;
  border-bottom:none!important;
  background:linear-gradient(90deg,rgba(184,134,11,.06),transparent)!important;
  margin:24px 0 14px!important;}

/* ── 偈頌排版修正 ── */
.gatha .text-label,.verse .text-label,blockquote .text-label{
  display:block!important;margin-bottom:14px!important;}
.gatha,.verse,blockquote.verse{
  font-size:19px!important;line-height:2.2!important;
  text-align:center!important;padding:20px 28px!important;}

/* === 1.2x 舒適閱讀字級 === INNER === */
.ch-body,.chapter,.section,article,main{font-size:20px!important;line-height:1.9!important;}
.ch-body p,p,li,td,th{font-size:20px!important;line-height:1.9!important;}
h1{font-size:38px!important;}h2{font-size:30px!important;}h3{font-size:23.5px!important;}

.card-title,.col-title,.section-title{font-size:21.5px!important;}
.flow-box{font-size:17.5px!important;line-height:1.7!important;}
.grid-cell,.grid-item,.comparison td,.comparison th{font-size:19px!important;}
.phase-badge{font-size:14px!important;}
/* === 金底 h5 疊色防護 === */

  border-radius:8px;padding:16px 22px;margin:14px 0;
  box-shadow:0 1px 3px rgba(0,0,0,.05);}
.qa .q{padding:10px 14px;margin-bottom:10px;
  background:rgba(70,110,180,.06);border-left:3px solid #446c9c;
  color:#2a4464;line-height:1.85;}
.qa .a{padding:10px 14px;
  background:rgba(139,94,60,.04);border-left:3px solid var(--accent);
  color:var(--text);line-height:1.9;}
.qa-label{font-family:&quot;Noto Sans TC&quot;,sans-serif;font-weight:700;
  letter-spacing:1px;margin-right:6px;}

/* Insight card */
.insight,.card,.commentary{background:var(--card);border:1px solid var(--border);
  border-radius:8px;padding:16px 22px;margin:14px 0;
  box-shadow:0 1px 3px rgba(0,0,0,.06);}
.insight h5,.card h5,.commentary h5{
  font-size:14px;color:var(--gold);letter-spacing:2px;
  font-family:&quot;Noto Sans TC&quot;,sans-serif;margin-bottom:8px;}

/* Verse */
.verse,.gatha{background:var(--verseBg);border-left:4px solid var(--verseBd);
  padding:14px 22px;line-height:1.9;margin:16px 0;
  white-space:normal;text-align:center;
  font-family:&quot;Noto Serif TC&quot;,serif;border-radius:0 6px 6px 0;}

/* Story box */
.story-box{background:#fcf7ea;border:1px dashed var(--accentL);
  border-radius:10px;padding:18px 24px;margin:18px 0;position:relative;}
.story-label{display:inline-block;background:var(--accentL);color:#fff;
  font-family:&quot;Noto Sans TC&quot;,sans-serif;font-size:11px;padding:3px 12px;
  border-radius:12px;letter-spacing:2px;margin-bottom:12px;}
.story-box p{margin-bottom:10px;line-height:1.95;color:var(--text);}

/* Four grid */
.four-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin:16px 0;}
.four-grid .cell{background:var(--card);border:1px solid var(--border);
  border-radius:8px;padding:14px 18px;}
.cell-title{font-weight:700;color:var(--accent);margin-bottom:6px;
  font-family:&quot;Noto Sans TC&quot;,sans-serif;letter-spacing:1px;}
.cell-desc{font-size:14.5px;color:var(--text2);line-height:1.85;}

/* Flow chart vertical */
.flow-chart{display:flex;flex-direction:column;align-items:center;margin:18px 0;}
.flow-step{background:var(--card);border:1px solid var(--border);
  border-radius:8px;padding:10px 22px;min-width:260px;text-align:center;
  box-shadow:0 1px 3px rgba(0,0,0,.05);}
.flow-step strong{display:block;color:var(--accent);margin-bottom:2px;}
.flow-step small{display:block;color:var(--text-muted);
  font-family:&quot;Noto Sans TC&quot;,sans-serif;font-size:12px;margin-top:2px;}
.flow-arrow{font-size:20px;color:var(--accentL);margin:6px 0;}

/* Next link */
.next-link{display:inline-block;margin-top:22px;padding:10px 22px;
  background:linear-gradient(135deg,var(--gold),var(--goldL));
  color:#fff;text-decoration:none;border-radius:24px;
  font-family:&quot;Noto Sans TC&quot;,sans-serif;font-size:13px;letter-spacing:2px;
  transition:all .3s;}
.next-link:hover{transform:translateX(4px);box-shadow:0 4px 12px rgba(184,134,11,.35);}

/* Back to top */
#backTop{position:fixed;right:22px;bottom:72px;width:44px;height:44px;
  border-radius:50%;background:var(--accent);color:#fff;border:none;
  font-size:20px;cursor:pointer;opacity:0;pointer-events:none;
  transition:all .3s;z-index:110;box-shadow:0 4px 14px rgba(0,0,0,.25);}
#backTop.show{opacity:1;pointer-events:auto;}
#backTop:hover{background:var(--gold);transform:translateY(-3px);}

/* Footer */
.site-footer{background:#1e1a14;color:#8a7a60;text-align:center;
  padding:40px 20px 50px;font-size:12px;letter-spacing:3px;
  font-family:&quot;Noto Sans TC&quot;,sans-serif;border-top:2px solid var(--gold);}
.site-footer .ft-t{color:var(--goldL);font-size:16px;letter-spacing:6px;margin-bottom:10px;}

/* Responsive */
@media (max-width:900px){
  #sb{transform:translateX(-100%);transition:transform .3s;}
  #sb.open{transform:translateX(0);}
  #sbToggle{display:flex;align-items:center;justify-content:center;}
  .main{margin-left:0;}
  .hero-title{font-size:38px;letter-spacing:3px;}
  .ch-name{font-size:24px;}
  .ch-body{padding:28px 20px;}
  .four-grid{grid-template-columns:1fr;}
  .site-hero{padding:60px 24px 50px;}
  .ch-head{padding:36px 20px 30px;}
}
@media (max-width:600px){
  html,body{font-size:15.5px;}
  .hero-title{font-size:32px;}
  .hero-sub{font-size:17px;}
  .toc-title{font-size:24px;letter-spacing:8px;}
}

/* ── 基礎：隱藏滾動條、防複製 ── */
html,body{margin:0;padding:0;background:transparent;
  overflow:hidden!important;
  scrollbar-width:none!important;-ms-overflow-style:none!important;
  -webkit-user-select:none!important;-moz-user-select:none!important;
  -ms-user-select:none!important;user-select:none!important;
  -webkit-touch-callout:none!important;}
html::-webkit-scrollbar,body::-webkit-scrollbar,
*::-webkit-scrollbar{display:none!important;width:0!important;height:0!important;}
*{-webkit-user-select:none!important;-moz-user-select:none!important;
  -ms-user-select:none!important;user-select:none!important;
  -webkit-user-drag:none!important;
  scrollbar-width:none!important;}
body{padding:0 8px;}
#sb,#sbToggle,#backTop,aside.sb{display:none!important;}
.main{margin-left:0!important;}
img{-webkit-user-drag:none!important;pointer-events:none;}

/* ── 高度自適應（避免 iframe 內出現多餘空白） ── */
html,body,.main,main,.container,.wrap,.wrapper,.page,#app,#root{
  min-height:0!important;height:auto!important;}
.site-footer,footer.site-footer{min-height:0!important;}

/* ── 全面取消斜體：經典原典用正體更莊重 ── */

/* ── 內容區底色統一為暖色調，避免純白 ── */

/* ── 章標題統一為深色漸層居中樣式 ── */

  border-left:none!important;
  border-radius:0!important;

/* ── TOC 卡片統一底色 + 標題居中 ── */

.toc-section{background:var(--card,#fffdf7)!important;}
.toc-title,.toc-desc,.toc-header{text-align:center!important;}

/* ── 所有白底區塊統一為暖色（避免純白） ── */

/* ── 公式區塊：含 br 的 span 需 inline-block 避免邊框重疊 ── */

.toc-desc{font-family:&quot;Noto Sans TC&quot;,sans-serif;font-size:13px;color:var(--text-muted);letter-spacing:3px;margin-top:8px;}
.toc-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:18px;}
.toc-card{
  display:flex;gap:16px;padding:18px 22px;
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--r);text-decoration:none;color:var(--text);
  transition:all .25s;
}
.toc-card:hover{
  border-color:var(--gold);transform:translateY(-2px);
  box-shadow:0 6px 18px rgba(184,134,11,.15);
}
.toc-num{
  flex:none;width:40px;height:40px;border-radius:50%;
  background:var(--gold);color:#fff;
  display:flex;align-items:center;justify-content:center;
  font-family:&quot;Noto Sans TC&quot;,sans-serif;font-weight:700;font-size:17px;
}
.toc-text{flex:1;}
.toc-name{font-size:16px;font-weight:600;margin-bottom:4px;color:var(--text);}
.toc-sub{font-size:13px;color:var(--text-muted);font-family:&quot;Noto Sans TC&quot;,sans-serif;letter-spacing:1px;}

/* Chapter */
.chapter{margin:40px 0 0;}
.ch-head{
  background:var(--headGrad);color:#f5ecd8;
  padding:50px 40px 42px;text-align:center;
  border-top:2px solid var(--gold);
}
.ch-num{
  font-family:&quot;Noto Sans TC&quot;,sans-serif;font-size:13px;
  color:var(--goldL);letter-spacing:5px;margin-bottom:10px;
}
.ch-name{font-size:30px;font-weight:800;color:#fff;letter-spacing:2px;margin-bottom:10px;}
.ch-sub{font-size:15px;color:#d4c4a8;letter-spacing:3px;font-family:&quot;Noto Sans TC&quot;,sans-serif;}
.ch-head::after{
  content:&quot;&quot;;display:block;width:80px;height:1.5px;
  background:var(--gold);margin:22px auto 0;
}
.ch-body{
  max-width:860px;margin:0 auto;padding:40px 30px 50px;
  background:var(--card);
}

/* Bridge */
.bridge{
  background:linear-gradient(135deg,#fffdf5,#f5ecd8);
  border:1px solid var(--border);border-left:5px solid var(--gold);
  border-radius:10px;padding:18px 24px;margin:0 0 26px;
  box-shadow:0 2px 10px rgba(91,58,41,.06);
}
.bridge-outro{
  border-left-color:var(--accentL);
  background:linear-gradient(135deg,#fdf8e8,#f2e6c8);
  margin-top:30px;margin-bottom:14px;
}
.bridge-label{
  display:inline-block;font-family:&quot;Noto Sans TC&quot;,sans-serif;font-size:11px;
  background:var(--gold);color:#fff;padding:3px 12px;border-radius:12px;
  letter-spacing:2px;margin-bottom:10px;
}
.bridge-outro .bridge-label{background:var(--accent);}
.bridge p{margin:0 0 8px;color:var(--text2);line-height:2;font-size:15.5px;}
.bridge p:last-child{margin-bottom:0;}

/* Headings */
.ch-body h2{
  font-size:22px;color:var(--accent);margin:32px 0 14px;
  padding:10px 0 10px 20px;
  background:linear-gradient(90deg,rgba(184,134,11,.08),transparent);
  border-left:4px solid var(--gold);
  font-weight:700;letter-spacing:1px;
}
.ch-body h3{
  font-size:18px;color:var(--text);margin:24px 0 10px;
  padding-bottom:6px;border-bottom:1px solid var(--border-light);
  font-weight:600;
}
.ch-body h4{font-size:16px;color:var(--text2);margin:18px 0 8px;font-weight:600;}
.ch-body h5{font-size:15px;color:var(--gold);margin:14px 0 6px;font-weight:600;font-family:&quot;Noto Sans TC&quot;,sans-serif;}
.ch-body p{margin:0 0 12px;}
.ch-body strong,.ch-body b{color:var(--accent-red);font-weight:700;}

/* Classical text / 原典 */
.classical-text{
  background:#FFFDF5;border:1px solid #E8E0D0;border-radius:10px;
  padding:18px 24px;line-height:1.95;margin:16px 0;
  position:relative;
}
.text-label{
  display:inline-block;background:var(--sbBg);color:#fff;
  font-family:&quot;Noto Sans TC&quot;,sans-serif;font-size:11px;
  padding:4px 14px;border-radius:12px;letter-spacing:3px;margin-bottom:12px;
}
.classical-text p{margin:0 0 10px;text-indent:2em;}
.classical-text p.no-indent{text-indent:0;}
.classical-text .jing{
  background:#f0e8d8;padding:14px 22px;border-left:4px solid var(--verseBd);
  border-radius:6px;text-align:center;margin:8px 0 14px;font-size:17.5px;
  font-weight:600;color:var(--text);line-height:2;
}

/* Q&amp;A */
.qa{margin:16px 0;}
.qa .q{
  padding:10px 16px;border-left:3px solid #4a6fa5;
  background:rgba(74,111,165,.05);margin:0 0 4px;color:#2c4770;
}
.qa .a{padding:10px 16px;border-left:3px solid var(--accentL);margin:0 0 14px;}
.qa .label{
  display:inline-block;font-family:&quot;Noto Sans TC&quot;,sans-serif;font-size:12px;
  font-weight:700;margin-right:8px;letter-spacing:2px;
}
.qa .q .label{color:#4a6fa5;}
.qa .a .label{color:var(--accent-red);}

/* Cards */
.card,.insight,.commentary,.note{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--r);padding:16px 22px;margin:14px 0;
  box-shadow:0 1px 3px rgba(0,0,0,.08);
}
.card-title{
  font-family:&quot;Noto Sans TC&quot;,sans-serif;font-weight:700;
  color:var(--accent);font-size:15px;letter-spacing:2px;margin-bottom:8px;
}

/* Three-grid for parables */
.three-col{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px;margin:18px 0;}
.col-card{
  background:var(--card);border:1px solid var(--border);
  border-top:3px solid var(--gold);border-radius:var(--r);
  padding:16px 18px;
}
.col-card .col-num{
  display:inline-flex;width:28px;height:28px;border-radius:50%;
  background:var(--gold);color:#fff;align-items:center;justify-content:center;
  font-family:&quot;Noto Sans TC&quot;,sans-serif;font-weight:700;font-size:13px;margin-bottom:8px;
}
.col-card h5{color:var(--accent);font-size:15px;margin:4px 0 8px;font-family:&quot;Noto Serif TC&quot;,serif;}
.col-card p{font-size:14.5px;color:var(--text2);line-height:1.85;margin:0;}

/* Flow */
.flow{display:flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:center;
  background:#f8f3e8;padding:16px 18px;border-radius:10px;margin:18px 0;}
.flow-box{
  background:#fff;border:1.5px solid var(--gold);border-radius:8px;
  padding:10px 16px;font-size:14.5px;color:var(--text);min-width:140px;text-align:center;
}
.flow-box small{display:block;font-size:12px;color:var(--text-muted);margin-top:4px;}
.flow-arrow{color:var(--gold);font-weight:700;font-size:18px;}

/* Two-col compare */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:18px 0;}
.two-col .col-card{border-top:3px solid var(--accentL);}

/* Checklist */
.checklist{list-style:none;margin:12px 0;padding:0;}
.checklist li{
  padding:8px 0 8px 28px;position:relative;color:var(--text2);line-height:1.85;
  border-bottom:1px dashed var(--border-light);
}
.checklist li:last-child{border:none;}
.checklist li::before{
  content:&quot;○&quot;;position:absolute;left:6px;top:8px;color:var(--gold);font-size:14px;
}

/* Back top */
#backTop{
  display:none;position:fixed;right:26px;bottom:80px;
  width:44px;height:44px;border-radius:50%;border:none;
  background:var(--sbBg);color:var(--gold);font-size:18px;cursor:pointer;
  box-shadow:0 4px 14px rgba(0,0,0,.25);z-index:110;
}
#backTop.show{display:block;}

/* Footer */
.site-footer{
  background:var(--sbBg);color:var(--sbText);
  padding:40px 30px 60px;text-align:center;margin-top:50px;
}
.site-footer p{font-family:&quot;Noto Sans TC&quot;,sans-serif;font-size:13px;letter-spacing:2px;margin:0 0 8px;opacity:.7;}
.site-footer .gold{color:var(--gold);}

/* Responsive */
@media(max-width:900px){
  aside#sb{transform:translateX(-100%);transition:transform .3s;}
  aside#sb.open{transform:none;}
  #sbToggle{display:block;}
  .main{margin-left:0;}
  .site-hero{padding:60px 24px 50px;}
  .site-hero h1{font-size:34px;}
  .ch-head{padding:36px 24px 30px;}
  .ch-name{font-size:22px;}
  .ch-body{padding:30px 22px 40px;}
  .two-col,.three-col{grid-template-columns:1fr;}
}
@media(max-width:600px){
  body{font-size:15.5px;}
  .site-hero h1{font-size:28px;}
  .hero-meta{flex-direction:column;gap:8px;}
}

/* ── 基礎：隱藏滾動條、防複製 ── */
html,body{margin:0;padding:0;background:transparent;
  overflow:hidden!important;
  scrollbar-width:none!important;-ms-overflow-style:none!important;
  -webkit-user-select:none!important;-moz-user-select:none!important;
  -ms-user-select:none!important;user-select:none!important;
  -webkit-touch-callout:none!important;}
html::-webkit-scrollbar,body::-webkit-scrollbar,
*::-webkit-scrollbar{display:none!important;width:0!important;height:0!important;}
*{-webkit-user-select:none!important;-moz-user-select:none!important;
  -ms-user-select:none!important;user-select:none!important;
  -webkit-user-drag:none!important;
  scrollbar-width:none!important;}
body{padding:0 8px;}
#sb,#sbToggle,#backTop,aside.sb{display:none!important;}
.main{margin-left:0!important;}
img{-webkit-user-drag:none!important;pointer-events:none;}

/* ── 高度自適應（避免 iframe 內出現多餘空白） ── */
html,body,.main,main,.container,.wrap,.wrapper,.page,#app,#root{
  min-height:0!important;height:auto!important;}
.site-footer,footer.site-footer{min-height:0!important;}

/* ── 全面取消斜體：經典原典用正體更莊重 ── */
*{font-style:normal!important;}

/* ── 內容區底色統一為暖色調，避免純白 ── */
.ch-body{
  background:var(--bg,#f7f3ec)!important;
  max-width:980px!important;
  margin:0 auto!important;
  padding:36px 28px 48px!important;}

/* ── 章標題統一為深色漸層居中樣式 ── */
.ch-head{
  background:var(--headGrad,linear-gradient(135deg,#2a2218 0%,#3d3225 50%,#2a2218 100%))!important;
  padding:42px 32px!important;
  text-align:center!important;
  border-left:none!important;
  border-radius:0!important;
  position:relative!important;}
.ch-head .ch-num{
  font-size:12px!important;color:var(--gold,#b8860b)!important;
  letter-spacing:3px!important;opacity:.8!important;}
.ch-head .ch-title,
.ch-head .ch-name{
  font-size:30px!important;font-weight:900!important;
  color:#fff!important;letter-spacing:3px!important;}
.ch-head .ch-sub,
.ch-head .ch-desc{
  font-size:14.5px!important;color:var(--goldL,#d4a84b)!important;
  opacity:.85!important;max-width:600px!important;margin:0 auto!important;}

/* ── TOC 卡片統一底色 + 標題居中 ── */
.toc-card{background:var(--card,#fffdf7)!important;}
.toc-section{background:var(--card,#fffdf7)!important;}
.toc-title,.toc-desc,.toc-header{text-align:center!important;}

/* ── 所有白底區塊統一為暖色（避免純白） ── */
.card,.insight,.commentary,.note,.metaphor,
.col,.flow,.compare-table,.cell,.col-card{
  background:var(--card,#fffdf7)!important;}

/* ── 區塊標題強調色 ── */
.card-title,.col-title,.cell-title{
  color:var(--accent,#8b5e3c)!important;font-weight:700!important;}

/* ── 公式區塊：含 br 的 span 需 inline-block 避免邊框重疊 ── */
span[style*=&quot;border&quot;]{
  display:inline-block!important;vertical-align:middle!important;margin:6px 4px!important;}

/* ── 內文字體統一為 17px ── */
.card-content,.col-content,.section-content,
.insight,.commentary,.note,.cell-content,
.flow-step,.compare-table td{
  font-size:17px!important;line-height:1.8!important;}

/* ── 重點詞語強調 ── */
.card-content strong,.col-content strong,
.cell-content strong,.section-content strong,
.insight strong{color:var(--accent-red,#8B2500)!important;}

/* ── 節標題統一：左金邊 + 漸層背景色塊 ── */
.section-title,h3.section-title{
  font-size:18px!important;font-weight:700!important;
  color:var(--accent,#8b5e3c)!important;
  padding:10px 0 10px 20px!important;
  border-left:4px solid var(--gold,#b8860b)!important;
  border-bottom:none!important;
  background:linear-gradient(90deg,rgba(184,134,11,.06),transparent)!important;
  margin:24px 0 14px!important;}

/* ── 偈頌排版修正 ── */

  letter-spacing:10px;line-height:1.6;}

/* ============ Bridge ============ */
.bridge{background:linear-gradient(135deg,#fffdf5,#f5ecd8);
  border:1px solid var(--border);border-left:5px solid var(--gold);
  border-radius:10px;padding:18px 24px;margin:22px 0;}
.bridge-label{display:inline-block;font-family:&quot;Noto Sans TC&quot;,sans-serif;
  font-size:11px;background:var(--gold);color:#fff;padding:3px 12px;
  border-radius:12px;letter-spacing:2px;margin-bottom:10px;}
.bridge p{margin:0;color:var(--text2);line-height:2;font-size:15.5px;}
.bridge-outro{border-left-color:var(--accentL);
  background:linear-gradient(135deg,#fdf8e8,#f2e6c8);}
.bridge-outro .bridge-label{background:var(--accent);}

/* ============ 進度 ============ */
.read-progress{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);
  z-index:120;background:rgba(30,26,20,.92);color:var(--gold);
  padding:8px 22px;border-radius:30px;
  border:1px solid rgba(184,134,11,.5);
  box-shadow:0 4px 18px rgba(0,0,0,.25);
  font-family:&quot;Noto Sans TC&quot;,sans-serif;font-size:13px;letter-spacing:2px;
  display:flex;align-items:center;gap:12px;pointer-events:none;
  backdrop-filter:blur(6px);}
.rp-bar{width:140px;height:3px;background:rgba(212,196,168,.18);
  border-radius:2px;overflow:hidden;position:relative;}
.rp-fill{position:absolute;top:0;left:0;bottom:0;
  background:linear-gradient(90deg,var(--gold),var(--goldL));
  width:0%;transition:width .3s;}
.rp-pct{font-weight:600;min-width:38px;text-align:right;}
.rp-label{font-size:11px;opacity:.75;letter-spacing:3px;}

#backTop{position:fixed;right:20px;bottom:70px;width:44px;height:44px;
  border-radius:50%;background:var(--sbBg);color:var(--gold);
  border:1px solid var(--gold);cursor:pointer;font-size:18px;
  display:none;z-index:110;box-shadow:0 4px 14px rgba(0,0,0,.3);}

/* ============ Footer ============ */
.site-footer{text-align:center;padding:40px 20px 80px;
  color:var(--text-muted);font-size:13px;letter-spacing:2px;
  font-family:&quot;Noto Sans TC&quot;,sans-serif;}
.site-footer .fl{color:var(--gold);font-weight:600;}

/* ============ Responsive ============ */
@media(max-width:900px){
  #sb{transform:translateX(-100%);transition:transform .3s;}
  #sb.open{transform:translateX(0);}
  #sbToggle{display:block;}
  .main{margin-left:0;}
  .ch-body{padding:28px 22px;}
  .two-col,.three-col{grid-template-columns:1fr;}
  .pyramid-top,.pyramid-mid,.pyramid-bot{width:100%;min-width:auto;}
  .hero-title{font-size:32px;letter-spacing:2px;}
  .formula-body{font-size:17px;letter-spacing:2px;}
  .climax-main{font-size:24px;letter-spacing:4px;}
}
@media(max-width:600px){
  body{font-size:15.5px;}
  .ch-body h2{font-size:19px;}
  .toc-grid{grid-template-columns:1fr;}
}

/* ── 基礎：隱藏滾動條、防複製 ── */
html,body{margin:0;padding:0;background:transparent;
  overflow:hidden!important;
  scrollbar-width:none!important;-ms-overflow-style:none!important;
  -webkit-user-select:none!important;-moz-user-select:none!important;
  -ms-user-select:none!important;user-select:none!important;
  -webkit-touch-callout:none!important;}
html::-webkit-scrollbar,body::-webkit-scrollbar,
*::-webkit-scrollbar{display:none!important;width:0!important;height:0!important;}
*{-webkit-user-select:none!important;-moz-user-select:none!important;
  -ms-user-select:none!important;user-select:none!important;
  -webkit-user-drag:none!important;
  scrollbar-width:none!important;}
body{padding:0 8px;}
#sb,#sbToggle,#backTop,aside.sb{display:none!important;}
.main{margin-left:0!important;}
img{-webkit-user-drag:none!important;pointer-events:none;}

/* ── 高度自適應（避免 iframe 內出現多餘空白） ── */
html,body,.main,main,.container,.wrap,.wrapper,.page,#app,#root{
  min-height:0!important;height:auto!important;}
.site-footer,footer.site-footer{min-height:0!important;}

/* ── 全面取消斜體：經典原典用正體更莊重 ── */
*{font-style:normal!important;}

/* ── 內容區底色統一為暖色調，避免純白 ── */
.ch-body{
  background:var(--bg,#f7f3ec)!important;
  max-width:980px!important;
  margin:0 auto!important;
  padding:36px 28px 48px!important;}

/* ── 章標題統一為深色漸層居中樣式 ── */
.ch-head{
  background:var(--headGrad,linear-gradient(135deg,#2a2218 0%,#3d3225 50%,#2a2218 100%))!important;
  padding:42px 32px!important;
  text-align:center!important;
  border-left:none!important;
  border-radius:0!important;
  position:relative!important;}
.ch-head .ch-num{
  font-size:12px!important;color:var(--gold,#b8860b)!important;
  letter-spacing:3px!important;opacity:.8!important;}

  opacity:.85!important;max-width:600px!important;margin:0 auto!important;}

/* ── TOC 卡片統一底色 + 標題居中 ── */
.toc-card{background:var(--card,#fffdf7)!important;}
.toc-section{background:var(--card,#fffdf7)!important;}
.toc-title,.toc-desc,.toc-header{text-align:center!important;}

/* ── 所有白底區塊統一為暖色（避免純白） ── */
.card,.insight,.commentary,.note,.metaphor,
.col,.flow,.compare-table,.cell,.col-card{
  background:var(--card,#fffdf7)!important;}

/* ── 區塊標題強調色 ── */
.card-title,.col-title,.cell-title{
  color:var(--accent,#8b5e3c)!important;font-weight:700!important;}

/* ── 公式區塊：含 br 的 span 需 inline-block 避免邊框重疊 ── */
span[style*=&quot;border&quot;]{
  display:inline-block!important;vertical-align:middle!important;margin:6px 4px!important;}

/* ── 內文字體統一為 17px ── */

.insight,.commentary,.note,.cell-content,

/* ── 基礎：隱藏滾動條、防複製 ── */
html,body{margin:0;padding:0;background:transparent;
  overflow:hidden!important;
  scrollbar-width:none!important;-ms-overflow-style:none!important;
  -webkit-user-select:none!important;-moz-user-select:none!important;
  -ms-user-select:none!important;user-select:none!important;
  -webkit-touch-callout:none!important;}
html::-webkit-scrollbar,body::-webkit-scrollbar,
*::-webkit-scrollbar{display:none!important;width:0!important;height:0!important;}
*{-webkit-user-select:none!important;-moz-user-select:none!important;
  -ms-user-select:none!important;user-select:none!important;
  -webkit-user-drag:none!important;
  scrollbar-width:none!important;}
body{padding:0 8px;}
#sb,#sbToggle,#backTop,aside.sb{display:none!important;}
.main{margin-left:0!important;}
img{-webkit-user-drag:none!important;pointer-events:none;}

/* ── 高度自適應（避免 iframe 內出現多餘空白） ── */
html,body,.main,main,.container,.wrap,.wrapper,.page,#app,#root{
  min-height:0!important;height:auto!important;}
.site-footer,footer.site-footer{min-height:0!important;}

/* ── 全面取消斜體：經典原典用正體更莊重 ── */
*{font-style:normal!important;}

/* ── 內容區底色統一為暖色調，避免純白 ── */
.ch-body{
  background:var(--bg,#f7f3ec)!important;
  max-width:980px!important;
  margin:0 auto!important;
  padding:36px 28px 48px!important;}

/* ── 章標題統一為深色漸層居中樣式 ── */
.ch-head{
  background:var(--headGrad,linear-gradient(135deg,#2a2218 0%,#3d3225 50%,#2a2218 100%))!important;
  padding:42px 32px!important;
  text-align:center!important;
  border-left:none!important;
  border-radius:0!important;
  position:relative!important;}
.ch-head .ch-num{
  font-size:12px!important;color:var(--gold,#b8860b)!important;
  letter-spacing:3px!important;opacity:.8!important;}
.ch-head .ch-title,
.ch-head .ch-name{
  font-size:30px!important;font-weight:900!important;
  color:#fff!important;letter-spacing:3px!important;}
.ch-head .ch-sub,
.ch-head .ch-desc{
  font-size:14.5px!important;color:var(--goldL,#d4a84b)!important;
  opacity:.85!important;max-width:600px!important;margin:0 auto!important;}

/* ── TOC 卡片統一底色 + 標題居中 ── */
.toc-card{background:var(--card,#fffdf7)!important;}
.toc-section{background:var(--card,#fffdf7)!important;}
.toc-title,.toc-desc,.toc-header{text-align:center!important;}

/* ── 所有白底區塊統一為暖色（避免純白） ── */
.card,.insight,.commentary,.note,.metaphor,
.col,.flow,.compare-table,.cell,.col-card{
  background:var(--card,#fffdf7)!important;}

/* ── 區塊標題強調色 ── */
.card-title,.col-title,.cell-title{
  color:var(--accent,#8b5e3c)!important;font-weight:700!important;}

/* ── 公式區塊：含 br 的 span 需 inline-block 避免邊框重疊 ── */
span[style*=&quot;border&quot;]{
  display:inline-block!important;vertical-align:middle!important;margin:6px 4px!important;}

/* ── 內文字體統一為 17px ── */
.card-content,.col-content,.section-content,
.insight,.commentary,.note,.cell-content,
.flow-step,.compare-table td{
  font-size:17px!important;line-height:1.8!important;}

/* ── 重點詞語強調 ── */
.card-content strong,.col-content strong,
.cell-content strong,.section-content strong,
.insight strong{color:var(--accent-red,#8B2500)!important;}

/* ── 節標題統一：左金邊 + 漸層背景色塊 ── */
.section-title,h3.section-title{
  font-size:18px!important;font-weight:700!important;
  color:var(--accent,#8b5e3c)!important;
  padding:10px 0 10px 20px!important;
  border-left:4px solid var(--gold,#b8860b)!important;
  border-bottom:none!important;
  background:linear-gradient(90deg,rgba(184,134,11,.06),transparent)!important;
  margin:24px 0 14px!important;}

/* ── 偈頌排版修正 ── */
.gatha .text-label,.verse .text-label,blockquote .text-label{

.gatha,.verse,blockquote.verse{

#backTop{position:fixed;right:22px;bottom:70px;width:44px;height:44px;
  border-radius:50%;background:var(--sbBg);color:var(--goldL);border:1px solid var(--gold);
  font-size:20px;cursor:pointer;display:none;z-index:110;}
#backTop.show{display:block;}

@media(max-width:900px){
  #sb{transform:translateX(-100%);transition:transform .3s;}
  #sb.open{transform:translateX(0);}
  #sbToggle{display:block;}
  .main{margin-left:0;padding:0 12px 60px;}
  .two-col,.three-col{grid-template-columns:1fr;}
  .ch-body{padding:22px 16px;}
  h2{font-size:19px;}
  p{font-size:15.5px;}
}

/* ── 基礎：隱藏滾動條、防複製 ── */
html,body{margin:0;padding:0;background:transparent;
  overflow:hidden!important;
  scrollbar-width:none!important;-ms-overflow-style:none!important;
  -webkit-user-select:none!important;-moz-user-select:none!important;
  -ms-user-select:none!important;user-select:none!important;
  -webkit-touch-callout:none!important;}
html::-webkit-scrollbar,body::-webkit-scrollbar,
*::-webkit-scrollbar{display:none!important;width:0!important;height:0!important;}
*{-webkit-user-select:none!important;-moz-user-select:none!important;
  -ms-user-select:none!important;user-select:none!important;
  -webkit-user-drag:none!important;
  scrollbar-width:none!important;}
body{padding:0 8px;}
#sb,#sbToggle,#backTop,aside.sb{display:none!important;}
.main{margin-left:0!important;}
img{-webkit-user-drag:none!important;pointer-events:none;}

/* ── 高度自適應（避免 iframe 內出現多餘空白） ── */
html,body,.main,main,.container,.wrap,.wrapper,.page,#app,#root{
  min-height:0!important;height:auto!important;}
.site-footer,footer.site-footer{min-height:0!important;}

/* ── 全面取消斜體：經典原典用正體更莊重 ── */
*{font-style:normal!important;}

/* ── 內容區底色統一為暖色調，避免純白 ── */
.ch-body{
  background:var(--bg,#f7f3ec)!important;
  max-width:980px!important;
  margin:0 auto!important;
  padding:36px 28px 48px!important;}

/* ── 章標題統一為深色漸層居中樣式 ── */
.ch-head{
  background:var(--headGrad,linear-gradient(135deg,#2a2218 0%,#3d3225 50%,#2a2218 100%))!important;
  padding:42px 32px!important;
  text-align:center!important;
  border-left:none!important;
  border-radius:0!important;
  position:relative!important;}
.ch-head .ch-num{
  font-size:12px!important;color:var(--gold,#b8860b)!important;
  letter-spacing:3px!important;opacity:.8!important;}
.ch-head .ch-title,
.ch-head .ch-name{
  font-size:30px!important;font-weight:900!important;
  color:#fff!important;letter-spacing:3px!important;}
.ch-head .ch-sub,
.ch-head .ch-desc{
  font-size:14.5px!important;color:var(--goldL,#d4a84b)!important;
  opacity:.85!important;max-width:600px!important;margin:0 auto!important;}

/* ── TOC 卡片統一底色 + 標題居中 ── */
.toc-card{background:var(--card,#fffdf7)!important;}
.toc-section{background:var(--card,#fffdf7)!important;}
.toc-title,.toc-desc,.toc-header{text-align:center!important;}

/* ── 所有白底區塊統一為暖色（避免純白） ── */
.card,.insight,.commentary,.note,.metaphor,
.col,.flow,.compare-table,.cell,.col-card{
  background:var(--card,#fffdf7)!important;}

/* ── 區塊標題強調色 ── */
.card-title,.col-title,.cell-title{
  color:var(--accent,#8b5e3c)!important;font-weight:700!important;}

/* ── 公式區塊：含 br 的 span 需 inline-block 避免邊框重疊 ── */
span[style*=&quot;border&quot;]{
  display:inline-block!important;vertical-align:middle!important;margin:6px 4px!important;}

/* ── 內文字體統一為 17px ── */
.card-content,.col-content,.section-content,
.insight,.commentary,.note,.cell-content,
.flow-step,.compare-table td{
  font-size:17px!important;line-height:1.8!important;}

/* ── 重點詞語強調 ── */
.card-content strong,.col-content strong,
.cell-content strong,.section-content strong,
.insight strong{color:var(--accent-red,#8B2500)!important;}

/* ── 節標題統一：左金邊 + 漸層背景色塊 ── */
.section-title,h3.section-title{
  font-size:18px!important;font-weight:700!important;
  color:var(--accent,#8b5e3c)!important;
  padding:10px 0 10px 20px!important;
  border-left:4px solid var(--gold,#b8860b)!important;
  border-bottom:none!important;
  background:linear-gradient(90deg,rgba(184,134,11,.06),transparent)!important;
  margin:24px 0 14px!important;}

/* ── 偈頌排版修正 ── */
.gatha .text-label,.verse .text-label,blockquote .text-label{
  display:block!important;margin-bottom:14px!important;}
.gatha,.verse,blockquote.verse{
  font-size:19px!important;line-height:2.2!important;
  text-align:center!important;padding:20px 28px!important;}

/* === 1.2x 舒適閱讀字級 === INNER === */
.ch-body,.chapter,.section,article,main{font-size:20px!important;line-height:1.9!important;}
.ch-body p,p,li,td,th{font-size:20px!important;line-height:1.9!important;}
h1{font-size:38px!important;}h2{font-size:30px!important;}h3{font-size:23.5px!important;}
.verse,.gatha,blockquote,.classical-text{font-size:22px!important;line-height:2.2!important;}
.card-content,.col-content,.section-content{font-size:20px!important;line-height:1.9!important;}
.card-title,.col-title,.section-title{font-size:21.5px!important;}
.flow-box{font-size:17.5px!important;line-height:1.7!important;}
.grid-cell,.grid-item,.comparison td,.comparison th{font-size:19px!important;}
.phase-badge{font-size:14px!important;}
/* === 金底 h5 疊色防護 === */
.sp-mid,.sp-mid *{color:#fff!important;}
.sp-mid h5{color:#fff!important;font-weight:700!important;text-shadow:0 1px 3px rgba(0,0,0,.35);}
.sp-mid small{color:rgba(255,255,255,.92)!important;}

/* Two column general */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin:16px 0;}

  font-family:&quot;Noto Sans TC&quot;,sans-serif;}

.three-col{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin:16px 0;}

/* Highlight quote */
.highlight-quote{text-align:center;font-size:36px;letter-spacing:16px;color:var(--text);
  margin:30px 0 20px;padding:30px 20px;border-top:1px solid var(--border);border-bottom:1px solid var(--border);
  font-weight:600;}
.highlight-caption{text-align:center;font-size:13px;color:var(--text-muted);letter-spacing:2px;margin-bottom:20px;
  font-family:&quot;Noto Sans TC&quot;,sans-serif;}

/* Arrow callout */
.arrow-conclusion{margin:26px 0 10px;padding:18px 40px 18px 30px;
  background:linear-gradient(90deg,#f4e2d0,#fdf8ea);border:1px solid var(--border);border-radius:8px;
  position:relative;color:var(--text);font-size:16px;text-align:center;letter-spacing:1px;}
.arrow-conclusion strong{color:var(--accent-red);}

/* Spectrum summary */
.summary-3col{display:grid;grid-template-columns:repeat(3,1fr);gap:0;margin:18px 0;
  background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.summary-3col .sum-col{padding:22px 24px;border-right:1px solid var(--border);}
.summary-3col .sum-col:last-child{border-right:none;}
.sum-head{font-size:17px;font-weight:700;color:var(--text);margin-bottom:12px;letter-spacing:2px;}
.sum-body{font-size:14.5px;color:var(--text2);line-height:2;}
.sum-plus{display:inline-block;color:var(--accent-red);font-weight:700;margin:0 6px;}

/* Conclusion section final */
.final-conclusion{background:linear-gradient(135deg,#fdf8e8,#f2e6c8);border:1px solid var(--border);
  border-radius:12px;padding:30px 36px;margin:24px 0;}
.final-conclusion h3{border:none;padding:0;color:var(--accent);letter-spacing:2px;}

/* Next link */
.next-link{display:inline-block;margin-top:24px;padding:8px 20px;border:1px solid var(--gold);
  border-radius:20px;color:var(--gold);text-decoration:none;font-family:&quot;Noto Sans TC&quot;,sans-serif;
  font-size:13px;letter-spacing:2px;transition:all .25s;}
.next-link:hover{background:var(--gold);color:#fff;}

/* Footer */
.site-footer{text-align:center;padding:40px 20px;color:var(--text-muted);font-size:12px;
  letter-spacing:2px;font-family:&quot;Noto Sans TC&quot;,sans-serif;border-top:1px solid var(--border);
  margin-top:60px;}

/* Progress */
.read-progress{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);z-index:120;
  background:rgba(30,26,20,.92);color:var(--gold);padding:8px 22px;border-radius:30px;
  border:1px solid rgba(184,134,11,.5);box-shadow:0 4px 18px rgba(0,0,0,.25);
  font-family:&quot;Noto Sans TC&quot;,sans-serif;font-size:13px;letter-spacing:2px;
  display:flex;align-items:center;gap:12px;pointer-events:none;user-select:none;backdrop-filter:blur(6px);}
.read-progress .rp-bar{width:140px;height:3px;background:rgba(212,196,168,.18);border-radius:2px;
  overflow:hidden;position:relative;}
.read-progress .rp-fill{position:absolute;top:0;left:0;bottom:0;
  background:linear-gradient(90deg,var(--gold),var(--goldL));width:0%;transition:width .3s;}
.read-progress .rp-pct{font-weight:600;min-width:38px;text-align:right;}
.read-progress .rp-label{font-size:11px;opacity:.75;letter-spacing:3px;}

#backTop{position:fixed;right:24px;bottom:70px;width:44px;height:44px;border-radius:50%;
  background:var(--sbBg);color:var(--gold);border:1px solid var(--gold);cursor:pointer;
  font-size:18px;display:none;align-items:center;justify-content:center;z-index:90;}
#backTop.show{display:flex;}

/* Responsive */
@media (max-width:900px){
  #sb{transform:translateX(-100%);transition:transform .3s;}
  #sb.open{transform:translateX(0);}
  #sbToggle{display:block;}
  .main{margin-left:0;padding:0 16px 80px;}
  .site-hero{margin:0 -16px 30px;padding:70px 20px 60px;}
  .site-hero h1{font-size:30px;letter-spacing:2px;}
  .site-hero h2{font-size:17px;}
  .ch-head{padding:36px 20px;}
  .ch-name{font-size:22px;}
  .ch-body{padding:28px 22px;}
  .qa-pair,.two-col,.three-col,.axis-diagram,.summary-3col{grid-template-columns:1fr;}
  .qa-col.q{border-right:none;border-bottom:1px solid var(--border);}
  .summary-3col .sum-col{border-right:none;border-bottom:1px solid var(--border);}
  .highlight-quote{font-size:24px;letter-spacing:8px;}
}
@media (max-width:600px){
  body{font-size:15.5px;}
  .site-hero h1{font-size:24px;}
}

/* ── 基礎：隱藏滾動條、防複製 ── */
html,body{margin:0;padding:0;background:transparent;
  overflow:hidden!important;
  scrollbar-width:none!important;-ms-overflow-style:none!important;
  -webkit-user-select:none!important;-moz-user-select:none!important;
  -ms-user-select:none!important;user-select:none!important;
  -webkit-touch-callout:none!important;}
html::-webkit-scrollbar,body::-webkit-scrollbar,
*::-webkit-scrollbar{display:none!important;width:0!important;height:0!important;}
*{-webkit-user-select:none!important;-moz-user-select:none!important;
  -ms-user-select:none!important;user-select:none!important;
  -webkit-user-drag:none!important;
  scrollbar-width:none!important;}
body{padding:0 8px;}
#sb,#sbToggle,#backTop,aside.sb{display:none!important;}
.main{margin-left:0!important;}
img{-webkit-user-drag:none!important;pointer-events:none;}

/* ── 高度自適應（避免 iframe 內出現多餘空白） ── */
html,body,.main,main,.container,.wrap,.wrapper,.page,#app,#root{
  min-height:0!important;height:auto!important;}
.site-footer,footer.site-footer{min-height:0!important;}

/* ── 全面取消斜體：經典原典用正體更莊重 ── */
*{font-style:normal!important;}

/* ── 內容區底色統一為暖色調，避免純白 ── */
.ch-body{
  background:var(--bg,#f7f3ec)!important;
  max-width:980px!important;
  margin:0 auto!important;
  padding:36px 28px 48px!important;}

/* ── 章標題統一為深色漸層居中樣式 ── */
.ch-head{
  background:var(--headGrad,linear-gradient(135deg,#2a2218 0%,#3d3225 50%,#2a2218 100%))!important;

  text-align:center!important;
  border-left:none!important;
  border-radius:0!important;
  position:relative!important;}
.ch-head .ch-num{

/* ── TOC 卡片統一底色 + 標題居中 ── */

.toc-section{background:var(--card,#fffdf7)!important;}
.toc-title,.toc-desc,.toc-header{text-align:center!important;}

/* ── 所有白底區塊統一為暖色（避免純白） ── */

.col,.flow,.compare-table,.cell,.col-card{

  color:var(--accent,#8b5e3c)!important;font-weight:700!important;}

/* ── 公式區塊：含 br 的 span 需 inline-block 避免邊框重疊 ── */
span[style*=&quot;border&quot;]{
  display:inline-block!important;vertical-align:middle!important;margin:6px 4px!important;}

.flow-step,.compare-table td{

  color:#b8a888;margin-top:10px;letter-spacing:1px;}

/* Preface */
.preface{max-width:880px;margin:44px auto 20px;padding:0 30px;}
.preface-card{background:linear-gradient(135deg,#fffdf5,#f5ecd8);
  border:1px solid var(--border);border-left:5px solid var(--gold);
  border-radius:12px;padding:26px 32px;box-shadow:0 3px 14px rgba(91,58,41,.08);}
.preface-label{display:inline-block;background:var(--gold);color:#fff;
  font-family:&quot;Noto Sans TC&quot;,sans-serif;font-size:11px;letter-spacing:3px;
  padding:4px 14px;border-radius:14px;margin-bottom:14px;}
.preface p{margin:0 0 12px;color:var(--text2);line-height:2;font-size:16px;}
.preface p:last-child{margin-bottom:0;}

/* TOC */
.toc-section{max-width:1100px;margin:40px auto 20px;padding:0 30px;}
.toc-title{text-align:center;font-size:26px;color:var(--accent);letter-spacing:8px;
  margin-bottom:8px;font-weight:700;}
.toc-desc{text-align:center;color:var(--text-muted);font-family:&quot;Noto Sans TC&quot;,sans-serif;
  font-size:13px;letter-spacing:3px;margin-bottom:30px;}
.toc-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:18px;}
.toc-card{background:var(--card);border:1px solid var(--border);border-radius:10px;
  padding:20px 22px;text-decoration:none;color:var(--text);display:flex;gap:16px;
  transition:all .25s;cursor:pointer;box-shadow:0 1px 3px rgba(0,0,0,.04);}
.toc-card:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(91,58,41,.12);
  border-color:var(--gold);}
.toc-num{flex-shrink:0;width:40px;height:40px;border-radius:50%;background:var(--gold);
  color:#fff;display:flex;align-items:center;justify-content:center;
  font-family:&quot;Noto Sans TC&quot;,sans-serif;font-weight:700;font-size:16px;}
.toc-name{font-weight:600;color:var(--accent);margin-bottom:6px;font-size:16px;}
.toc-sub{font-size:13px;color:var(--text-muted);line-height:1.6;}

/* Chapter */
.chapter{margin:30px 0;}
.ch-head{background:var(--headGrad);color:#fff;padding:48px 30px 42px;text-align:center;
  position:relative;border-top:1px solid var(--gold);border-bottom:1px solid var(--gold);}
.ch-head::after{content:&quot;&quot;;position:absolute;bottom:18px;left:50%;transform:translateX(-50%);
  width:80px;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);}
.ch-num{font-family:&quot;Noto Sans TC&quot;,sans-serif;font-size:12px;letter-spacing:5px;
  color:var(--goldL);margin-bottom:12px;}
.ch-name{font-size:clamp(24px,3.2vw,32px);margin:0 0 10px;font-weight:900;
  color:#f4e8c8;letter-spacing:3px;}
.ch-sub{font-size:15px;color:#b8a888;letter-spacing:2px;font-weight:400;}

.ch-body{max-width:900px;margin:0 auto;padding:40px 30px;}

/* Bridges */
.bridge{background:linear-gradient(135deg,#fffdf5,#f5ecd8);border:1px solid var(--border);
  border-left:5px solid var(--gold);border-radius:10px;padding:18px 24px;
  margin:0 0 26px;box-shadow:0 2px 10px rgba(91,58,41,.06);}
.bridge-outro{border-left-color:var(--accentL);
  background:linear-gradient(135deg,#fdf8e8,#f2e6c8);margin:30px 0 0;}
.bridge-label{display:inline-block;font-family:&quot;Noto Sans TC&quot;,sans-serif;
  font-size:11px;background:var(--gold);color:#fff;padding:3px 12px;
  border-radius:12px;letter-spacing:2px;margin-bottom:10px;}
.bridge-outro .bridge-label{background:var(--accent);}
.bridge p{margin:0;color:var(--text2);line-height:2;font-size:15.5px;}

/* Headings */
h2{font-size:22px;color:var(--accent);border-left:4px solid var(--gold);
  padding:10px 0 10px 18px;margin:32px 0 14px;
  background:linear-gradient(90deg,rgba(212,168,75,.1),transparent);letter-spacing:1.5px;}
h3{font-size:18px;color:var(--text);border-bottom:1px solid var(--border);
  padding-bottom:6px;margin:24px 0 10px;letter-spacing:1px;}
h4{font-size:16px;color:var(--text2);margin:18px 0 8px;font-weight:600;}
h5{font-size:15px;color:var(--gold);margin:12px 0 6px;}

p{margin:0 0 12px;}

/* Classical text */
.classical-text{background:#FFFDF5;border:1px solid #E8E0D0;border-radius:10px;
  padding:18px 24px;line-height:1.9;margin:18px 0;}
.text-label{display:inline-block;background:var(--sbBg);color:var(--goldL);
  font-family:&quot;Noto Sans TC&quot;,sans-serif;font-size:11px;letter-spacing:3px;
  padding:4px 14px;border-radius:4px;margin-bottom:12px;}

/* QA */
.qa{margin:14px 0;}
.qa .q,.qa .a{padding:10px 18px;border-radius:8px;margin:8px 0;}
.qa .q{background:rgba(139,37,0,.06);border-left:3px solid var(--accent-red);color:var(--text);}
.qa .a{background:rgba(184,134,11,.05);border-left:3px solid var(--gold);color:var(--text);}
p.qa-2{padding-left:2em;}
p.qa-3{padding-left:3em;}

/* Cards */
.card,.insight,.note,.commentary{background:var(--card);border:1px solid var(--border);
  border-radius:8px;padding:16px 22px;margin:14px 0;box-shadow:0 1px 3px rgba(0,0,0,.05);}
.insight{border-left:4px solid var(--gold);background:linear-gradient(135deg,#fffdf5,#f8f0dc);}
.insight-title{font-weight:700;color:var(--accent);margin-bottom:8px;font-size:16px;
  display:flex;align-items:center;gap:8px;}
.insight-title::before{content:&quot;✦&quot;;color:var(--gold);}

/* Verse */
.verse,.gatha{background:var(--verseBg);border-left:4px solid var(--verseBd);
  padding:14px 22px;line-height:2;margin:16px 0;text-align:center;
  font-size:17px;white-space:normal;border-radius:0 8px 8px 0;}

/* Strong */
strong,b{color:var(--accent-red);font-weight:700;}

/* Grids */
.two-col,.four-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin:18px 0;}
.three-col{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin:18px 0;}
.col-card{background:var(--card);border:1px solid var(--border);border-radius:8px;
  padding:16px 20px;}
.col-card h5{margin-top:0;}

/* Debate */
.debate{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:18px 0;}
.debate-q,.debate-a{padding:16px 20px;border-radius:8px;}
.debate-q{background:rgba(30,90,150,.07);border-left:4px solid #3d6ea5;}
.debate-a{background:rgba(139,37,0,.06);border-left:4px solid var(--accent-red);}
.debate-label{font-family:&quot;Noto Sans TC&quot;,sans-serif;font-size:11px;letter-spacing:3px;
  color:var(--text-muted);margin-bottom:8px;text-transform:uppercase;}

/* Flow */
.flow{display:flex;flex-wrap:wrap;align-items:center;justify-content:center;gap:12px;
  margin:20px 0;padding:16px;background:rgba(255,253,247,.6);border-radius:10px;
  border:1px dashed var(--border);}
.flow-box,.flow-step{background:var(--card);border:1.5px solid var(--gold);border-radius:8px;
  padding:12px 18px;min-width:120px;text-align:center;color:var(--text);font-weight:600;}
.flow-box small,.flow-step small{display:block;color:var(--text-muted);font-weight:400;
  font-size:12px;margin-top:4px;}
.flow-arrow{color:var(--gold);font-size:22px;font-weight:bold;}
.flow-v{flex-direction:column;}

/* Matrix table */
.matrix{width:100%;border-collapse:collapse;margin:18px 0;
  background:var(--card);border:1px solid var(--border);border-radius:8px;overflow:hidden;}
.matrix th,.matrix td{padding:12px 16px;border:1px solid var(--border-light);
  text-align:center;font-size:15px;}
.matrix th{background:rgba(184,134,11,.1);color:var(--accent);font-weight:700;
  letter-spacing:1px;}
.matrix td:first-child{background:rgba(139,37,0,.06);color:var(--accent-red);
  font-weight:700;width:80px;}

/* Equation */
.equation{display:flex;align-items:center;justify-content:center;gap:14px;flex-wrap:wrap;
  margin:24px 0;padding:24px 16px;background:var(--card);border:1px solid var(--border);
  border-radius:12px;}
.eq-term{padding:14px 20px;border-radius:8px;text-align:center;min-width:140px;
  font-weight:700;font-family:&quot;Noto Sans TC&quot;,sans-serif;}
.eq-bad{background:rgba(139,37,0,.1);border:1.5px solid var(--accent-red);color:var(--accent-red);}
.eq-good{background:rgba(82,115,90,.1);border:1.5px solid #527a5a;color:#355a3e;}
.eq-gold{background:rgba(184,134,11,.12);border:1.5px solid var(--gold);color:var(--accent);}
.eq-sym{font-size:26px;color:var(--text-muted);font-weight:300;}
.eq-sub{font-size:11px;display:block;margin-top:4px;opacity:.75;letter-spacing:1px;}

/* Next link */
.next-link{display:inline-block;margin-top:30px;padding:10px 22px;background:var(--gold);
  color:#fff;border-radius:20px;text-decoration:none;font-family:&quot;Noto Sans TC&quot;,sans-serif;
  font-size:13px;letter-spacing:2px;transition:all .25s;}
.next-link:hover{background:var(--accent);transform:translateX(4px);}

/* Back to top */
#backTop{position:fixed;bottom:70px;right:24px;width:44px;height:44px;border-radius:50%;
  background:var(--sbBg);color:var(--goldL);border:1px solid var(--gold);cursor:pointer;
  font-size:18px;display:none;z-index:120;box-shadow:0 3px 10px rgba(0,0,0,.2);}
#backTop.show{display:block;}

/* Progress */
.read-progress{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);z-index:120;
  background:rgba(30,26,20,.92);color:var(--gold);padding:8px 22px;border-radius:30px;
  border:1px solid rgba(184,134,11,.5);box-shadow:0 4px 18px rgba(0,0,0,.25);
  font-family:&quot;Noto Sans TC&quot;,sans-serif;font-size:13px;letter-spacing:2px;
  display:flex;align-items:center;gap:12px;pointer-events:none;backdrop-filter:blur(6px);}
.rp-bar{width:140px;height:3px;background:rgba(212,196,168,.18);border-radius:2px;
  overflow:hidden;position:relative;}
.rp-fill{position:absolute;top:0;left:0;bottom:0;
  background:linear-gradient(90deg,var(--gold),var(--goldL));width:0%;transition:width .3s;}
.rp-pct{font-weight:600;min-width:38px;text-align:right;}
.rp-label{font-size:11px;opacity:.75;letter-spacing:3px;}

/* Footer */
.site-footer{background:var(--sbBg);color:var(--sbText);padding:30px;text-align:center;
  border-top:2px solid var(--gold);margin-top:40px;}
.site-footer .fl{font-family:&quot;Noto Sans TC&quot;,sans-serif;font-size:12px;letter-spacing:3px;
  color:var(--goldL);margin-bottom:8px;}
.site-footer .fc{font-size:13px;color:#a59786;}

/* Responsive */
@media (max-width:900px){
  #sb{transform:translateX(-100%);transition:transform .3s;}
  #sb.open{transform:translateX(0);}
  #sbToggle{display:block;}
  .main{margin-left:0;}
  .two-col,.four-grid,.three-col,.debate{grid-template-columns:1fr;}
  .ch-body{padding:28px 20px;}
  .site-hero{padding:50px 20px 40px;}
}
@media (max-width:600px){
  body{font-size:15.5px;}
  .ch-name{font-size:22px;}
  h2{font-size:19px;}
}

/* ── 基礎：隱藏滾動條、防複製 ── */
html,body{margin:0;padding:0;background:transparent;
  overflow:hidden!important;
  scrollbar-width:none!important;-ms-overflow-style:none!important;
  -webkit-user-select:none!important;-moz-user-select:none!important;
  -ms-user-select:none!important;user-select:none!important;
  -webkit-touch-callout:none!important;}
html::-webkit-scrollbar,body::-webkit-scrollbar,
*::-webkit-scrollbar{display:none!important;width:0!important;height:0!important;}
*{-webkit-user-select:none!important;-moz-user-select:none!important;
  -ms-user-select:none!important;user-select:none!important;
  -webkit-user-drag:none!important;
  scrollbar-width:none!important;}
body{padding:0 8px;}
#sb,#sbToggle,#backTop,aside.sb{display:none!important;}
.main{margin-left:0!important;}
img{-webkit-user-drag:none!important;pointer-events:none;}

/* ── 高度自適應（避免 iframe 內出現多餘空白） ── */
html,body,.main,main,.container,.wrap,.wrapper,.page,#app,#root{
  min-height:0!important;height:auto!important;}
.site-footer,footer.site-footer{min-height:0!important;}

/* ── 全面取消斜體：經典原典用正體更莊重 ── */
*{font-style:normal!important;}

/* ── 內容區底色統一為暖色調，避免純白 ── */
.ch-body{
  background:var(--bg,#f7f3ec)!important;
  max-width:980px!important;
  margin:0 auto!important;
  padding:36px 28px 48px!important;}

/* ── 章標題統一為深色漸層居中樣式 ── */
.ch-head{
  background:var(--headGrad,linear-gradient(135deg,#2a2218 0%,#3d3225 50%,#2a2218 100%))!important;
  padding:42px 32px!important;
  text-align:center!important;
  border-left:none!important;
  border-radius:0!important;
  position:relative!important;}
.ch-head .ch-num{
  font-size:12px!important;color:var(--gold,#b8860b)!important;
  letter-spacing:3px!important;opacity:.8!important;}
.ch-head .ch-title,
.ch-head .ch-name{
  font-size:30px!important;font-weight:900!important;
  color:#fff!important;letter-spacing:3px!important;}
.ch-head .ch-sub,
.ch-head .ch-desc{
  font-size:14.5px!important;color:var(--goldL,#d4a84b)!important;
  opacity:.85!important;max-width:600px!important;margin:0 auto!important;}

/* ── TOC 卡片統一底色 + 標題居中 ── */
.toc-card{background:var(--card,#fffdf7)!important;}
.toc-section{background:var(--card,#fffdf7)!important;}
.toc-title,.toc-desc,.toc-header{text-align:center!important;}

/* ── 所有白底區塊統一為暖色（避免純白） ── */
.card,.insight,.commentary,.note,.metaphor,
.col,.flow,.compare-table,.cell,.col-card{
  background:var(--card,#fffdf7)!important;}

/* ── 區塊標題強調色 ── */
.card-title,.col-title,.cell-title{
  color:var(--accent,#8b5e3c)!important;font-weight:700!important;}

/* ── 公式區塊：含 br 的 span 需 inline-block 避免邊框重疊 ── */
span[style*=&quot;border&quot;]{
  display:inline-block!important;vertical-align:middle!important;margin:6px 4px!important;}

/* ── 內文字體統一為 17px ── */
.card-content,.col-content,.section-content,
.insight,.commentary,.note,.cell-content,
.flow-step,.compare-table td{
  font-size:17px!important;line-height:1.8!important;}

/* ── 重點詞語強調 ── */
.card-content strong,.col-content strong,
.cell-content strong,.section-content strong,
.insight strong{color:var(--accent-red,#8B2500)!important;}

/* ── 節標題統一：左金邊 + 漸層背景色塊 ── */
.section-title,h3.section-title{
  font-size:18px!important;font-weight:700!important;

  padding:10px 0 10px 20px!important;
  border-left:4px solid var(--gold,#b8860b)!important;
  border-bottom:none!important;
  background:linear-gradient(90deg,rgba(184,134,11,.06),transparent)!important;
  margin:24px 0 14px!important;}

/* ── 偈頌排版修正 ── */
